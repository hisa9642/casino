<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D 8-LINE SLOT - Multiplay</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; user-select: none; }
        #three-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* UI関連 */
        #multi-status { position: fixed; top: 10px; right: 10px; z-index: 2000; color: #0f0; background: rgba(0,0,0,0.7); padding: 8px; font-size: 12px; border-radius: 5px; pointer-events: none; }
        #mobile-toggle { position: fixed; top: 10px; left: 10px; z-index: 2000; padding: 10px; cursor: pointer; }
        #joystick-container { position: fixed; bottom: 30px; left: 30px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; display: none; z-index: 2000; }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); }

        /* スロット画面 */
        #ui { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 1000; transform: scale(0); transition: 0.3s; }
        #ui.active { transform: scale(var(--ui-scale, 1)); pointer-events: auto; }
        .slot-container { width: 450px; height: 750px; background: #222; border: 8px solid #444; border-radius: 20px; display: flex; flex-direction: column; align-items: center; color: white; }
        
        .lcd { width: 80%; height: 100px; background: #000; margin-top: 20px; border: 3px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #status-text { color: #f00; font-size: 1.8rem; }
        
        .reels { display: flex; gap: 8px; background: #000; padding: 10px; margin: 15px 0; border: 4px solid #555; }
        .reel-box { width: 100px; height: 240px; background: #fff; overflow: hidden; position: relative; }
        .strip { position: absolute; width: 100%; top: 0; }
        .symbol { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #000; border-bottom: 1px solid #ddd; }

        .stop-btn { width: 80px; height: 80px; border-radius: 50%; background: #ccc; cursor: pointer; font-weight: bold; border: 4px solid #999; }
        #win-effect-container { position: fixed; top: 30%; width: 100%; text-align: center; z-index: 2000; pointer-events: none; }
        .win-pop { color: gold; font-size: 4rem; font-weight: bold; text-shadow: 0 0 10px #000; animation: pop 0.5s ease-out; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1.2); } }
    </style>
</head>
<body onload="initAll()">

<button id="mobile-toggle" onclick="toggleMobile()">Mobile ON/OFF</button>
<div id="joystick-container"><div id="joystick-knob"></div></div>
<div id="three-canvas"></div>
<div id="multi-status">P2P: Initializing...</div>
<div id="win-effect-container"></div>

<div id="ui">
    <div class="slot-container">
        <div style="margin-top:10px;"><button onclick="closeUI()">EXIT</button></div>
        <div class="lcd"><div id="status-text">READY</div></div>
        <div class="reels">
            <div class="reel-box"><div id="s0" class="strip"></div></div>
            <div class="reel-box"><div id="s1" class="strip"></div></div>
            <div class="reel-box"><div id="s2" class="strip"></div></div>
        </div>
        <div style="font-size:1.5rem; margin-bottom:10px;">CREDIT: <span id="credit">100</span> | BET: <span id="bet">3</span></div>
        <div style="margin-bottom:10px;">
            <button onclick="changeBet(1)">+1</button>
            <button onclick="changeBet(10)">+10</button>
            <button onclick="changeBet(-1)">-1</button>
        </div>
        <button onclick="startSpin()" style="width:120px; height:50px; background:red; color:white; font-weight:bold; cursor:pointer;">SPIN</button>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button id="b0" class="stop-btn" onclick="stopReel(0)">STOP</button>
            <button id="b1" class="stop-btn" onclick="stopReel(1)">STOP</button>
            <button id="b2" class="stop-btn" onclick="stopReel(2)">STOP</button>
        </div>
    </div>
</div>

<script>
    // --- 3D & プレイヤー同期 ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('three-canvas').appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const others = {};
    const machines = [];
    function init3D() {
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshStandardMaterial({color: 0x444444}));
        floor.rotation.x = -Math.PI/2; floor.position.y = -2; scene.add(floor);
        for(let i=-2; i<=2; i++) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 1.5), new THREE.MeshStandardMaterial({color: 0x111111}));
            m.position.set(-8, 0, i*6); scene.add(m); machines.push(m);
        }
    }

    // --- P2P設定 ---
    const roomName = prompt("部屋番号を入力", "777") || "777";
    const peer = new Peer();
    let connections = [];

    peer.on('open', (id) => {
        document.getElementById('multi-status').innerText = `ID: ${id}\nRoom: ${roomName}`;
        // 簡易マッチング：本来はサーバーが必要ですが、ここでは他者のIDを推測するか直接入力
        // （今回は「他人が見える」ロジックを優先して記述）
    });

    peer.on('connection', conn => {
        connections.push(conn);
        conn.on('data', data => handleSync(conn.peer, data));
    });

    function handleSync(id, data) {
        if(!others[id]) {
            others[id] = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({color: 0x00aaff}));
            scene.add(others[id]);
        }
        others[id].position.set(data.x, data.y - 0.5, data.z);
        others[id].rotation.y = data.ry;
    }

    function broadcast() {
        const data = { x: camera.position.x, y: camera.position.y, z: camera.position.z, ry: camera.rotation.y };
        connections.forEach(c => { if(c.open) c.send(data); });
    }

    // --- スロットロジック ---
    const PAYS = {'7️⃣':15, '💎':10, '🔔':8, '🍉':5, '🍒':2};
    const SYMBOLS = ['7️⃣','💎','🔔','🍉','🍒','🍒','🍉','🔔','💎','7️⃣'];
    let credit = 100, bet = 3, reels = [[],[],[]], speed = [0,0,0], pos = [0,0,0], isStopping = [false,false,false];

    function initSlot() {
        [0,1,2].forEach(i => {
            reels[i] = [...SYMBOLS].sort(()=>Math.random()-0.5);
            document.getElementById(`s${i}`).innerHTML = [...reels[i], ...reels[i]].map(s => `<div class="symbol">${s}</div>`).join('');
        });
    }

    function changeBet(n) { if(speed[0]>0) return; bet = Math.max(1, Math.min(credit, bet+n)); document.getElementById('bet').innerText = bet; }

    function startSpin() {
        if(speed[0]>0 || credit < bet) return;
        credit -= bet; document.getElementById('credit').innerText = credit;
        speed = [50, 50, 50]; isStopping = [false,false,false];
        requestAnimationFrame(updateReels);
    }

    function stopReel(i) {
        if(speed[i] > 0) {
            let currentIdx = Math.round(Math.abs(pos[i])/80);
            pos[i] = -(currentIdx * 80);
            speed[i] = 0;
            if(speed.every(s => s === 0)) checkWin();
        }
    }

    function updateReels() {
        let moving = false;
        [0,1,2].forEach(i => {
            if(speed[i] > 0) {
                moving = true;
                pos[i] -= speed[i];
                if(pos[i] <= -800) pos[i] = 0;
                document.getElementById(`s${i}`).style.top = pos[i] + "px";
            }
        });
        if(moving) requestAnimationFrame(updateReels);
    }

    function checkWin() {
        const results = [0,1,2].map(i => {
            let idx = Math.abs(pos[i]/80) % 10;
            return reels[i][idx];
        });
        if(results[0] === results[1] && results[1] === results[2]) {
            let win = bet * (PAYS[results[0]] || 1);
            credit += win;
            document.getElementById('credit').innerText = credit;
            const pop = document.createElement('div'); pop.className='win-pop'; pop.innerText=`WIN ${win}!`;
            document.getElementById('win-effect-container').appendChild(pop);
            setTimeout(() => pop.remove(), 2000);
        }
    }

    // --- 操作系 ---
    let move = {f:0, b:0, l:0, r:0}, yaw = 0, pitch = 0, isMob = false;
    camera.position.set(0, 0, 10);

    function initAll() {
        init3D(); initSlot();
        window.addEventListener('keydown', e => {
            if(e.key=='w') move.f=1; if(e.key=='s') move.b=1;
            if(e.key=='a') move.l=1; if(e.key=='d') move.r=1;
        });
        window.addEventListener('keyup', e => {
            if(e.key=='w') move.f=0; if(e.key=='s') move.b=0;
            if(e.key=='a') move.l=0; if(e.key=='d') move.r=0;
        });
        document.addEventListener('mousemove', e => {
            if(document.pointerLockElement === renderer.domElement) {
                yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
                pitch = Math.max(-1.5, Math.min(1.5, pitch));
            }
        });
        document.addEventListener('mousedown', () => {
            if(!document.getElementById('ui').classList.contains('active')) {
                const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
                if(ray.intersectObjects(machines).length > 0) toggleSlot(true);
                else renderer.domElement.requestPointerLock();
            }
        });
        loop();
    }

    function toggleSlot(o) { 
        document.getElementById('ui').classList.toggle('active', o);
        if(o) document.exitPointerLock();
    }
    function closeUI() { toggleSlot(false); }
    function toggleMobile() { isMob = !isMob; document.getElementById('joystick-container').style.display = isMob ? 'block' : 'none'; }

    function loop() {
        requestAnimationFrame(loop);
        if(!document.getElementById('ui').classList.contains('active')) {
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            let dir = new THREE.Vector3(move.r - move.l, 0, move.b - move.f).applyQuaternion(camera.quaternion);
            dir.y = 0; camera.position.addScaledVector(dir.normalize(), 0.1);
            broadcast();
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
