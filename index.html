<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Multiplayer Slot - Connection Fixed</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #info { position: fixed; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 10px; z-index: 100; pointer-events: none; border-radius: 5px; line-height: 1.5; }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="info">
    <div>部屋番号: <span id="room-id">-</span></div>
    <div>ステータス: <span id="status">初期化中...</span></div>
    <div>接続人数: <span id="peer-count">0</span>人</div>
    <div style="font-size: 0.8em; margin-top:5px;">操作: WASDで移動 / マウスで視点</div>
</div>
<div id="canvas-container"></div>

<script>
// --- 設定 ---
const roomNum = prompt("部屋番号を決めてください (例: 777)", "777") || "777";
const myId = "user-" + Math.random().toString(36).substring(2, 8);
const hostId = "slot-room-" + roomNum;

document.getElementById('room-id').innerText = roomNum;

// --- 3D Scene ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('canvas-container').appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const grid = new THREE.GridHelper(100, 100, 0x888888, 0x444444);
grid.position.y = -1;
scene.add(grid);

camera.position.set(Math.random() * 5, 0, 10);

const otherPlayers = {};

function createAvatar(id) {
    const color = Math.random() * 0xffffff;
    const mesh = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.5, 1, 4, 8),
        new THREE.MeshStandardMaterial({ color: color })
    );
    scene.add(mesh);
    return mesh;
}

// --- Network (PeerJS) ---
let peer = new Peer(myId);
let connections = [];

// 自分がホスト（親）を試みる
const peerHost = new Peer(hostId);

peerHost.on('open', () => {
    document.getElementById('status').innerText = "あなたがホスト（親）です";
    peerHost.on('connection', (conn) => {
        setupConn(conn);
    });
});

peerHost.on('error', (err) => {
    // ホストIDが既に使われている＝誰かが既にホストをやっている場合
    if (err.type === 'unavailable-id') {
        document.getElementById('status').innerText = "ホストに接続中...";
        const conn = peer.connect(hostId);
        setupConn(conn);
    }
});

function setupConn(conn) {
    conn.on('open', () => {
        connections.push(conn);
        document.getElementById('peer-count').innerText = connections.length;
        // 接続できたら即座に自分の位置を送る
        sendPos();
    });

    conn.on('data', (data) => {
        if (data.type === 'pos') {
            if (!otherPlayers[data.id]) {
                otherPlayers[data.id] = createAvatar(data.id);
            }
            otherPlayers[data.id].position.set(data.x, data.y, data.z);
            
            // ホスト（親）なら、受け取ったデータを全員に配る（中継）
            if (peerHost.open) {
                connections.forEach(c => {
                    if (c.open && c.peer !== conn.peer) c.send(data);
                });
            }
        }
    });

    conn.on('close', () => {
        // 切断したアバターを消す
        if (otherPlayers[conn.peer]) {
            scene.remove(otherPlayers[conn.peer]);
            delete otherPlayers[conn.peer];
        }
    });
}

function sendPos() {
    const data = { type: 'pos', id: myId, x: camera.position.x, y: camera.position.y - 0.5, z: camera.position.z };
    connections.forEach(c => { if (c.open) c.send(data); });
}

// --- Controls ---
let move = { f: 0, b: 0, l: 0, r: 0 };
document.addEventListener('keydown', e => {
    if (e.key === 'w') move.f = 1; if (e.key === 's') move.b = 1;
    if (e.key === 'a') move.l = 1; if (e.key === 'd') move.r = 1;
});
document.addEventListener('keyup', e => {
    if (e.key === 'w') move.f = 0; if (e.key === 's') move.b = 0;
    if (e.key === 'a') move.l = 0; if (e.key === 'd') move.r = 0;
});

document.addEventListener('mousedown', () => renderer.domElement.requestPointerLock());
document.addEventListener('mousemove', e => {
    if (document.pointerLockElement === renderer.domElement) {
        camera.rotation.y -= e.movementX * 0.003;
    }
});

// --- Loop ---
function loop() {
    requestAnimationFrame(loop);

    const dir = new THREE.Vector3(move.r - move.l, 0, move.b - move.f).normalize();
    dir.applyQuaternion(camera.quaternion);
    dir.y = 0;
    camera.position.addScaledVector(dir, 0.1);

    if (connections.length > 0) {
        sendPos();
    }

    renderer.render(scene, camera);
}
loop();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
