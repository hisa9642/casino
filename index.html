<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>8-LINE SLOT - Mobile Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --gold: #ffd700; --fever: #ff0000; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; touch-action: none; user-select: none; }
        #three-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #mobile-toggle { position: fixed; top: 10px; right: 10px; z-index: 5000; background: #444; color: white; border: 1px solid #fff; padding: 10px; border-radius: 5px; cursor: pointer; }
        #joystick-container { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; z-index: 4500; display: none; touch-action: none; }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; }
        #chat-container { position: fixed; bottom: 10px; right: 10px; width: 250px; height: 120px; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; z-index: 4000; border-radius: 5px; }
        #chat-box { flex: 1; overflow-y: auto; color: white; font-size: 11px; padding: 5px; }
        #chat-input { background: #333; border: 1px solid #555; color: white; padding: 5px; outline: none; }
        #ui, #bj-ui { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 2000; transform: scale(0); transition: 0.3s; }
        #ui.active, #bj-ui.active { transform: scale(var(--ui-scale, 1)); pointer-events: auto; }
        .slot-container, .bj-container { width: 480px; height: 780px; background: #222; border: 10px solid #444; border-radius: 20px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); position: relative; }
        .bj-container { background: #0b2e0b; border-color: #265426; }
        .paytable { position: absolute; right: 100%; top: 50px; margin-right: 20px; width: 160px; background: rgba(17, 17, 17, 0.95); border: 4px solid #444; border-radius: 10px; padding: 15px; color: gold; font-size: 1rem; }
        .pay-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 5px 0; }
        #win-effect-container { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 3000; pointer-events: none; text-align: center; width: 100%; }
        .win-pop { color: #ff0000; font-size: 4rem; font-weight: bold; text-shadow: 0 0 20px #fff, 0 0 40px gold; animation: popIn 0.5s forwards, fadeOut 0.5s 2.5s forwards; margin: 10px; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }
        .lcd { width: 85%; height: 110px; background: #000; margin-top: 25px; border: 4px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #fever-label { color: #f00; font-size: 1.6rem; visibility: hidden; animation: blink 0.4s infinite alternate; }
        #status-text { color: #f00; font-size: 2rem; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.1; } }
        .reels { display: flex; gap: 10px; background: #000; padding: 15px; margin: 20px 0; border: 6px solid #666; }
        .reel-box { width: 110px; height: 240px; background: #fff; overflow: hidden; position: relative; }
        .strip { position: absolute; width: 100%; top: 0; left: 0; }
        .symbol { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 3.2rem; border-bottom: 1px solid #ddd; box-sizing: border-box; color: #000; }
        .stats { color: #f00; font-size: 1.8rem; display: flex; gap: 30px; margin-bottom: 15px; }
        .lever { width: 65px; height: 65px; background: radial-gradient(#666, #222); border-radius: 50%; border: 4px solid #777; cursor: pointer; }
        .stop-btn { width: 95px; height: 95px; border-radius: 50%; background: #ccc; border: 6px solid #999; font-weight: bold; cursor: pointer; }
        .bj-screen { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; gap: 15px; }
        .card-row { display: flex; gap: 5px; min-height: 80px; margin: 10px 0; }
        .card { width: 50px; height: 75px; background: white; border-radius: 5px; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; border: 1px solid #999; }
        .bj-btn { padding: 12px 24px; font-size: 1rem; cursor: pointer; background: #444; color: #fff; border: 2px solid #888; border-radius: 5px; width: 220px; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; opacity: 0.8; }
    </style>
</head>
<body onload="initAll()">

<div id="three-canvas"></div>
<button id="mobile-toggle" onclick="toggleMobile()">スマホモード: OFF</button>
<div id="joystick-container"><div id="joystick-knob"></div></div>
<div id="chat-container">
    <div id="chat-box"></div>
    <input type="text" id="chat-input" placeholder="Enter to Chat" onkeydown="sendChat(event)">
</div>
<div id="crosshair"></div>
<div id="win-effect-container"></div>

<div id="ui">
    <div class="slot-container">
        <div class="paytable" id="pay-list"></div>
        <div style="width:100%; display:flex; justify-content:space-between; padding:10px; box-sizing:border-box;">
            <button onclick="resetGame()" style="cursor:pointer; background: #822; color: white; border: none; padding: 5px 15px; border-radius: 5px;">RESET</button>
            <button onclick="closeUI()" style="cursor:pointer; background: #444; color: white; border: none; padding: 5px 15px; border-radius: 5px;">EXIT</button>
        </div>
        <div class="lcd"><div id="fever-label">🔥 FEVER TIME 🔥</div><div id="status-text">READY</div></div>
        <div class="reels">
            <div class="reel-box" id="rb0"><div id="s0" class="strip"></div></div>
            <div class="reel-box" id="rb1"><div id="s1" class="strip"></div></div>
            <div class="reel-box" id="rb2"><div id="s2" class="strip"></div></div>
        </div>
        <div class="stats"><div>coin: <span id="credit">100</span></div><div>BET: <span id="bet-val">3</span></div></div>
        <div style="margin-bottom:15px; color:white;">
            <button onclick="changeBet(-1)">-1</button><button onclick="changeBet(10)">+10</button>
            <button onclick="changeBet(1)">+1</button><button onclick="maxBet()">MAX</button>
        </div>
        <div class="lever" onclick="start()"></div>
        <div style="display:flex; gap:15px; margin-top:15px;">
            <button id="b0" class="stop-btn" disabled onclick="stopR(0)">STOP</button>
            <button id="b1" class="stop-btn" disabled onclick="stopR(1)">STOP</button>
            <button id="b2" class="stop-btn" disabled onclick="stopR(2)">STOP</button>
        </div>
    </div>
</div>

<div id="bj-ui">
    <div class="bj-container">
        <div style="width:100%; display:flex; justify-content:space-between; padding:10px; box-sizing:border-box;">
            <div style="width:100px;"></div>
            <button onclick="closeBJ()" style="cursor:pointer; background: #444; color: white; border: none; padding: 5px 15px; border-radius: 5px;">EXIT</button>
        </div>
        <div id="bj-bet-select" class="bj-screen">
            <div style="color:gold; font-size:2rem;">BLACKJACK</div>
            <div style="color:white;">BET (1-100)</div>
            <div id="bj-bet-num" style="color:gold; font-size:2rem;">10</div>
            <input type="range" id="bj-bet-range" min="1" max="100" value="10" oninput="document.getElementById('bj-bet-num').innerText=this.value">
            <button class="bj-btn" onclick="bjPreStart()">START</button>
        </div>
        <div id="bj-game" class="bj-screen" style="display:none;">
            <div class="card-row" id="bj-opp-cards"></div>
            <div class="card-row" id="bj-my-cards"></div>
            <div id="bj-my-info" style="color:gold;">YOU: <span id="bj-my-score">0</span></div>
            <div style="display:flex; gap:10px;">
                <button class="bj-btn" style="width:100px;" onclick="bjHit()">HIT</button>
                <button class="bj-btn" style="width:100px;" onclick="bjStand()">STAND</button>
            </div>
        </div>
    </div>
</div>

<script>
    const PAYS = { '7️⃣': 9, '⭐': 8, '💎': 7, '🎰': 6, '🔔': 5, '🍉': 4, '🍇': 3, '🍒': 2 };
    let REELS_DATA = [[], [], []], credit = 100, bet = 3, pos = [0,0,0], speed = [0,0,0], stopping = [false,false,false], targetPos = [0,0,0];
    let isFever = false, isSuperFever = false, feverRounds = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let isMobileMode = false;

    function playTone(freq, type, dur, vol=0.1) { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + dur); }
    const sounds = { stop: () => playTone(440, 'sine', 0.1), winLine: () => playTone(880, 'square', 0.2), coin: () => playTone(1200 + Math.random()*400, 'sine', 0.1, 0.05), fever: () => { playTone(523, 'triangle', 0.3); setTimeout(()=>playTone(659, 'triangle', 0.3), 150); } };
    
    function shuffleReels() { 
        const normBase = ['🍒','🍒','🍒','🍒','🍇','🍇','🍉','🔔','💎','🍉']; 
        const feverBase = ['7️⃣','7️⃣','7️⃣','⭐','⭐','🎰','🎰','💎','🍉','🍉']; 
        const sfBase = ['7️⃣','7️⃣','7️⃣','7️⃣','🍒','🍒','🍒','🍒','7️⃣','🍒']; 
        [0,1,2].forEach(i => { 
            let base = isSuperFever ? sfBase : (isFever ? feverBase : normBase); 
            REELS_DATA[i] = [...base, ...base].sort(()=>Math.random()-0.5); 
            document.getElementById(`s${i}`).innerHTML = [...REELS_DATA[i], ...REELS_DATA[i]].map(s => `<div class="symbol">${s}</div>`).join(''); 
        }); 
    }
    function changeBet(n) { if(speed.some(s=>s>0)) return; bet = Math.max(1, Math.min(100, credit, bet+n)); document.getElementById('bet-val').innerText = bet; }
    function maxBet() { changeBet(100); }
    function start() { 
        if(speed.some(s=>s>0) || credit < bet) return; 
        if(audioCtx.state === 'suspended') audioCtx.resume(); 
        document.getElementById('win-effect-container').innerHTML = ''; 
        if(feverRounds <= 0) { isFever = false; isSuperFever = false; document.getElementById('fever-label').style.visibility = 'hidden'; }
        shuffleReels(); credit -= bet; updateCredit(); 
        let lbl = isSuperFever ? "SUPER" : "FEVER";
        document.getElementById('status-text').innerText = (isFever || isSuperFever) ? `${lbl} ${feverRounds}` : "SPINNING...";
        speed = [55, 55, 55]; stopping = [false,false,false]; 
        [0,1,2].forEach(i => document.getElementById(`b${i}`).disabled = false);
        animateSlot(); 
    }
    function stopR(i) { sounds.stop(); let cur = Math.abs(pos[i]); let idx = Math.ceil(cur/80)+1; targetPos[i] = -((idx+1)*80); stopping[i] = true; document.getElementById(`b${i}`).disabled = true; }
    function animateSlot() { 
        let m = false; 
        [0,1,2].forEach(i => { 
            if(speed[i] > 0) { 
                m = true; 
                if(stopping[i]) { let d = targetPos[i]-pos[i]; if(Math.abs(d)<1){pos[i]=targetPos[i]; speed[i]=0;} else pos[i]+=d*0.15; } 
                else { pos[i]-=speed[i]; if(pos[i]<=-1600) pos[i]=0; } 
                document.getElementById(`s${i}`).style.top = pos[i]+"px"; 
            } 
        }); 
        if(m) requestAnimationFrame(animateSlot); else if(stopping.every(s=>s)) check(); 
    }
    async function check() { 
        const grid = [0,1,2].map(i => { let off = Math.abs(Math.round(pos[i]/80)); return [REELS_DATA[i][off%20], REELS_DATA[i][(off+1)%20], REELS_DATA[i][(off+2)%20]]; }); 
        const lines = [[grid[0][1], grid[1][1], grid[2][1]], [grid[0][0], grid[1][0], grid[2][0]], [grid[0][2], grid[1][2], grid[2][2]], [grid[0][0], grid[1][1], grid[2][2]], [grid[0][2], grid[1][1], grid[2][0]], [grid[0][0], grid[0][1], grid[0][2]], [grid[1][0], grid[1][1], grid[1][2]], [grid[2][0], grid[2][1], grid[2][2]]]; 
        let winCnt = 0, mults = []; 
        lines.forEach(l => { if(l[0]===l[1] && l[1]===l[2]) { winCnt++; mults.push(PAYS[l[0]]); } }); 
        if(mults.length > 0) { 
            const container = document.getElementById('win-effect-container'); 
            let currentTotal = 1; 
            for(let i=0; i<mults.length; i++) { 
                currentTotal *= mults[i]; 
                if(winCnt >= 2) { 
                    const div = document.createElement('div'); div.className = 'win-pop'; div.innerText = i === 0 ? `${mults[i]}倍！` : `× ${mults[i]}倍！`; 
                    container.appendChild(div); sounds.winLine(); await new Promise(r => setTimeout(r, 600)); 
                } 
            } 
            const finalDiv = document.createElement('div'); finalDiv.className = 'win-pop'; finalDiv.style.fontSize = '6rem'; finalDiv.style.color = 'gold'; finalDiv.innerText = `合計 ${currentTotal}倍！！`; 
            container.appendChild(finalDiv); sounds.winLine(); sounds.fever(); credit += (bet * currentTotal); updateCredit(); 
            if(isSuperFever) { if(winCnt >= 2) feverRounds = 2; else feverRounds--; } 
            else { if(winCnt >= 2) { isSuperFever = true; isFever = false; feverRounds = 2; document.getElementById('fever-label').innerText = "🔥 SUPER FEVER 🔥"; document.getElementById('fever-label').style.visibility = 'visible'; } 
            else { isFever = true; feverRounds = 3; document.getElementById('fever-label').innerText = "🔥 FEVER TIME 🔥"; document.getElementById('fever-label').style.visibility = 'visible'; } } 
        } else { if(isFever || isSuperFever) feverRounds--; } 
        if(feverRounds <= 0) { isFever = false; isSuperFever = false; document.getElementById('fever-label').style.visibility = 'hidden'; } 
        let lbl = isSuperFever ? "SUPER" : "FEVER";
        document.getElementById('status-text').innerText = (isFever || isSuperFever) ? `${lbl} ${feverRounds}` : "RETRY"; 
        saveGame(); 
    }

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('three-canvas').appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dl = new THREE.DirectionalLight(0xffffff, 0.8); dl.position.set(5, 10, 7); scene.add(dl);

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 60), new THREE.MeshStandardMaterial({ color: 0x666666 })); floor.rotation.x = -Math.PI/2; floor.position.y = -4; scene.add(floor);
    const ceil = new THREE.Mesh(new THREE.PlaneGeometry(30, 60), new THREE.MeshStandardMaterial({ color: 0x444444 })); ceil.rotation.x = Math.PI/2; ceil.position.y = 5; scene.add(ceil);
    const wallMat = new THREE.MeshStandardMaterial({ color: 0xdddddd });
    const sw1 = new THREE.Mesh(new THREE.PlaneGeometry(60, 15), wallMat); sw1.position.set(-10, 0, 0); sw1.rotation.y = Math.PI/2; scene.add(sw1);
    const sw2 = new THREE.Mesh(new THREE.PlaneGeometry(60, 15), wallMat); sw2.position.set(10, 0, 0); sw2.rotation.y = -Math.PI/2; scene.add(sw2);
    const bw = new THREE.Mesh(new THREE.PlaneGeometry(20, 15), wallMat); bw.position.set(0, 0, 30); bw.rotation.y = Math.PI; scene.add(bw);
    const fw = new THREE.Mesh(new THREE.PlaneGeometry(20, 15), wallMat); fw.position.set(0, 0, -30); scene.add(fw);

    const machines = [], bjTables = [];
    function createMachine(x, z) {
        const body = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 1.2), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        body.position.set(x, -2, z); scene.add(body);
        machines.push(body);
    }
    for(let i=-2; i<=2; i++) createMachine(-8.5, i*8);

    function createBJTable(x, z) {
        const table = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 1, 32), new THREE.MeshStandardMaterial({ color: 0x0b2e0b }));
        table.position.set(x, -3.5, z); scene.add(table);
        bjTables.push(table);
    }
    createBJTable(5, 0);

    const userName = prompt("名前を入力してください", "Player") || "Player";
    const roomNum = prompt("部屋番号を入力", "777") || "777";
    const myId = "P-" + roomNum + "-" + Math.floor(Math.random()*9999);
    const hostId = "ROOM-" + roomNum + "-HOST";

    function createNameTag(text) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256; canvas.height = 64;
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,256,64);
        ctx.fillStyle = 'white'; ctx.font = '32px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(text, 128, 44);
        const tex = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
        sprite.scale.set(2, 0.5, 1);
        sprite.position.y = 3.2;
        return sprite;
    }

    function createAvatar(name) {
        const group = new THREE.Group();
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({ color: 0xffccaa }));
        head.position.y = 2.4;
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.4, 0.5), new THREE.MeshStandardMaterial({ color: 0x3366ff }));
        body.position.y = 1.3;
        group.add(head, body);
        const tag = createNameTag(name);
        group.add(tag);
        group.userData.tag = tag;
        return group;
    }

    let peer = new Peer(myId);
    let connections = [];
    const otherPlayers = {};

    peer.on('open', (id) => tryConnectHost());

    function tryConnectHost() {
        const conn = peer.connect(hostId);
        setupConn(conn);
        setTimeout(() => { if (connections.filter(c => c.open).length === 0) startAsHost(); }, 3000);
    }

    function startAsHost() {
        const peerHost = new Peer(hostId);
        peerHost.on('connection', setupConn);
    }

    function setupConn(c) {
        c.on('open', () => { if(!connections.find(x=>x.peer===c.peer)) connections.push(c); });
        c.on('data', d => {
            if(d.type === 'move') {
                if(!otherPlayers[d.id]) {
                    const avatar = createAvatar(d.name || "Guest");
                    scene.add(avatar);
                    otherPlayers[d.id] = avatar;
                }
                otherPlayers[d.id].position.set(d.x, -4, d.z);
                otherPlayers[d.id].rotation.y = d.ry;
                if(peer.id.includes("HOST")) connections.forEach(conn => { if(conn.open && conn.peer !== c.peer) conn.send(d); });
            } else if(d.type === 'chat') {
                addChatMessage(d.msg, d.name);
                showBubble(d.id, d.msg);
                if(peer.id.includes("HOST")) connections.forEach(conn => { if(conn.open && conn.peer !== c.peer) conn.send(d); });
            }
        });
        c.on('close', () => { if(otherPlayers[c.peer]) { scene.remove(otherPlayers[c.peer]); delete otherPlayers[c.peer]; } connections = connections.filter(x => x.peer !== c.peer); });
    }

    function showBubble(id, msg) {
        const target = (id === myId) ? null : otherPlayers[id];
        if(!target) return;
        const originalTag = target.userData.tag;
        const bubble = createNameTag(msg);
        bubble.position.y = 3.8;
        target.add(bubble);
        setTimeout(() => target.remove(bubble), 1000);
    }

    function sendChat(e) {
        if(e.key === 'Enter') {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            const data = { type: 'chat', id: myId, name: userName, msg: input.value };
            addChatMessage(input.value, "You");
            connections.forEach(c => { if(c.open) c.send(data); });
            input.value = '';
        }
    }

    function addChatMessage(msg, sender) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.innerText = `${sender}: ${msg}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    let targetPitch = 0, targetYaw = 0, currentPitch = 0, currentYaw = 0, velocity = new THREE.Vector3(), moveDir = { f: false, b: false, l: false, r: false }, bobTime = 0;
    camera.position.set(0, -1, 15);

    // Joystick & Mobile Logic
    let joyData = { x: 0, y: 0, active: false };
    const joyContainer = document.getElementById('joystick-container');
    const joyKnob = document.getElementById('joystick-knob');

    function toggleMobile() {
        isMobileMode = !isMobileMode;
        document.getElementById('mobile-toggle').innerText = `スマホモード: ${isMobileMode ? 'ON' : 'OFF'}`;
        joyContainer.style.display = isMobileMode ? 'block' : 'none';
        if(!isMobileMode) document.exitPointerLock();
    }

    window.addEventListener('touchstart', e => {
        if(!isMobileMode || document.querySelector('.active')) return;
        const touch = e.touches[0];
        const rect = joyContainer.getBoundingClientRect();
        const dist = Math.hypot(touch.clientX - (rect.left + 60), touch.clientY - (rect.top + 60));
        if(dist < 60) joyData.active = true;
    });

    window.addEventListener('touchmove', e => {
        if(!isMobileMode || document.querySelector('.active')) return;
        const touch = e.touches[0];
        if(joyData.active) {
            const rect = joyContainer.getBoundingClientRect();
            let dx = touch.clientX - (rect.left + 60);
            let dy = touch.clientY - (rect.top + 60);
            const angle = Math.atan2(dy, dx);
            const dist = Math.min(Math.hypot(dx, dy), 40);
            joyData.x = (dist / 40) * Math.cos(angle);
            joyData.y = (dist / 40) * Math.sin(angle);
            joyKnob.style.transform = `translate(${joyData.x * 40}px, ${joyData.y * 40}px)`;
        } else {
            // Camera move
            targetYaw -= e.changedTouches[0].pageX * 0.00002; // 感度調整
            targetPitch -= e.changedTouches[0].pageY * 0.00002;
        }
    });

    window.addEventListener('touchend', () => { joyData.active = false; joyData.x = 0; joyData.y = 0; joyKnob.style.transform = 'translate(0,0)'; });

    document.addEventListener('mousedown', (e) => {
        if(document.querySelector('.active') || e.target.id === 'chat-input' || e.target.id === 'mobile-toggle') return;
        const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
        if(ray.intersectObjects(machines).length > 0) { updateUIScale(); document.getElementById('ui').classList.add('active'); }
        else if(ray.intersectObjects(bjTables).length > 0) { updateUIScale(); document.getElementById('bj-ui').classList.add('active'); }
        else if(!isMobileMode) renderer.domElement.requestPointerLock();
    });

    window.addEventListener('mousemove', e => { if (document.pointerLockElement === renderer.domElement) { targetYaw -= e.movementX * 0.002; targetPitch -= e.movementY * 0.002; } });
    window.addEventListener('keydown', e => { const k = e.code; if(k==='KeyW')moveDir.f=true; if(k==='KeyS')moveDir.b=true; if(k==='KeyA')moveDir.l=true; if(k==='KeyD')moveDir.r=true; });
    window.addEventListener('keyup', e => { const k = e.code; if(k==='KeyW')moveDir.f=false; if(k==='KeyS')moveDir.b=false; if(k==='KeyA')moveDir.l=false; if(k==='KeyD')moveDir.r=false; });

    function updateUIScale() { const s = Math.min(window.innerWidth / 500, window.innerHeight / 820, 1); document.documentElement.style.setProperty('--ui-scale', s); }
    function updateCredit() { document.getElementById('credit').innerText = credit; localStorage.setItem('slot_credit', credit); }
    function closeUI() { document.getElementById('ui').classList.remove('active'); }
    function closeBJ() { document.getElementById('bj-ui').classList.remove('active'); }

    let bjMyCards = [], bjOppCards = [], bjBet = 10;
    function bjPreStart() { bjBet = parseInt(document.getElementById('bj-bet-range').value); if(credit < bjBet) return alert("COIN不足"); credit -= bjBet; updateCredit(); document.getElementById('bj-bet-select').style.display = 'none'; document.getElementById('bj-game').style.display = 'flex'; bjStart(); }
    function bjStart() { bjMyCards = [draw()], bjOppCards = [draw()]; renderBJ(); }
    function draw() { const v = Math.floor(Math.random()*13)+1; return { v: Math.min(v, 10), label: v }; }
    function bjHit() { bjMyCards.push(draw()); if(bjScore(bjMyCards)>21) bjEnd("LOSE (BUST)"); else renderBJ(); }
    function bjStand() { while(bjScore(bjOppCards)<17) bjOppCards.push(draw()); const s1 = bjScore(bjMyCards), s2 = bjScore(bjOppCards); if(s2>21 || s1>s2) bjEnd("WIN", 2); else if(s1===s2) bjEnd("DRAW", 1); else bjEnd("LOSE"); }
    function bjScore(cards) { return cards.reduce((a, b) => a + b.v, 0); }
    function renderBJ() { document.getElementById('bj-my-cards').innerHTML = bjMyCards.map(c => `<div class="card">${c.label}</div>`).join(''); document.getElementById('bj-opp-cards').innerHTML = bjOppCards.map(c => `<div class="card">${c.label}</div>`).join(''); document.getElementById('bj-my-score').innerText = bjScore(bjMyCards); }
    function bjEnd(msg, mult=0) { alert(msg); if(mult>0) { credit += Math.floor(bjBet*mult); updateCredit(); } document.getElementById('bj-bet-select').style.display = 'flex'; document.getElementById('bj-game').style.display = 'none'; }

    function initAll() { 
        let s = localStorage.getItem('slot_credit'); if(s) credit = parseInt(s); updateCredit();
        shuffleReels(); 
        document.getElementById('pay-list').innerHTML = "<b>PAY TABLE</b><hr>" + Object.entries(PAYS).reverse().map(([s, v]) => `<div class="pay-item"><span>${s}</span><span>x${v}</span></div>`).join('');
        loop(); 
    }

    function loop() {
        requestAnimationFrame(loop);
        if (!document.querySelector('.active')) {
            currentYaw += (targetYaw - currentYaw) * 0.15;
            currentPitch += (targetPitch - currentPitch) * 0.15;
            camera.rotation.set(currentPitch, currentYaw, 0, 'YXZ');
            
            let wishDir = new THREE.Vector3();
            if(isMobileMode) {
                wishDir.z = joyData.y; wishDir.x = joyData.x;
            } else {
                if(moveDir.f) wishDir.z -= 1; if(moveDir.b) wishDir.z += 1; if(moveDir.l) wishDir.x -= 1; if(moveDir.r) wishDir.x += 1;
            }
            wishDir.normalize().applyQuaternion(camera.quaternion); wishDir.y = 0;
            velocity.addScaledVector(wishDir, 0.02); velocity.multiplyScalar(0.85);
            camera.position.add(velocity);
            
            if(Math.abs(camera.position.x) > 9.5) camera.position.x = Math.sign(camera.position.x) * 9.5;
            if(Math.abs(camera.position.z) > 29.5) camera.position.z = Math.sign(camera.position.z) * 29.5;
            
            connections.forEach(c => { if(c.open) c.send({ type: 'move', id: myId, name: userName, x: camera.position.x, z: camera.position.z, ry: camera.rotation.y }); });
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
