<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>8-LINE SLOT - Universal 3D Lobby</title>
    <style>
        :root { --gold: #ffd700; --fever: #ff0000; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; touch-action: none; }
        #three-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* スマホ用ボタン */
        #mobile-toggle { position: fixed; top: 20px; left: 20px; z-index: 2000; padding: 10px 20px; background: #444; color: white; border: 2px solid #fff; border-radius: 5px; cursor: pointer; pointer-events: auto; }
        #joystick-container { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; z-index: 2000; display: none; touch-action: none; }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); }

        /* スロットUI */
        #ui { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 1000; transform: scale(0); transition: 0.3s; }
        #ui.active { transform: scale(1); pointer-events: auto; }
        .paytable { position: absolute; left: 20px; width: 180px; background: rgba(17, 17, 17, 0.95); border: 4px solid #444; border-radius: 10px; padding: 15px; color: gold; font-size: 1.1rem; }
        .pay-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 5px 0; }
        .slot-container { width: 480px; height: 780px; background: #222; border: 10px solid #444; border-radius: 20px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        
        #win-effect-container { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; pointer-events: none; text-align: center; width: 100%; }
        .win-pop { color: #ff0000; font-size: 4rem; font-weight: bold; text-shadow: 0 0 20px #fff, 0 0 40px gold; animation: popIn 0.5s forwards, fadeOut 0.5s 2.5s forwards; margin: 10px; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }
        @keyframes shake { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(0, 0); } }
        
        .coin-particle { position: fixed; top: -50px; font-size: 2rem; z-index: 3000; pointer-events: none; animation: coinFall 1.5s linear forwards; }
        @keyframes coinFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

        .lcd { width: 85%; height: 110px; background: #000; margin-top: 25px; border: 4px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #fever-label { color: #f00; font-size: 1.6rem; visibility: hidden; animation: blink 0.4s infinite alternate; }
        #status-text { color: #f00; font-size: 2rem; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.1; } }
        .reels { display: flex; gap: 10px; background: #000; padding: 15px; margin: 20px 0; border: 6px solid #666; }
        .reel-box { width: 110px; height: 240px; background: #fff; overflow: hidden; position: relative; }
        .strip { position: absolute; width: 100%; top: 0; left: 0; }
        .symbol { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 3.2rem; border-bottom: 1px solid #ddd; box-sizing: border-box; color: #000; }
        .stats { color: #f00; font-size: 1.8rem; display: flex; gap: 30px; margin-bottom: 15px; }
        .lever { width: 65px; height: 65px; background: radial-gradient(#666, #222); border-radius: 50%; border: 4px solid #777; cursor: pointer; }
        .stop-btn { width: 95px; height: 95px; border-radius: 50%; background: #ccc; border: 6px solid #999; font-weight: bold; cursor: pointer; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; opacity: 0.8; }
    </style>
</head>
<body onload="initGame()">

<button id="mobile-toggle" onclick="toggleMobile()">スマホ用 ON/OFF</button>
<div id="joystick-container"><div id="joystick-knob"></div></div>
<div id="crosshair"></div>
<div id="win-effect-container"></div>
<div id="three-canvas"></div>

<div id="ui">
    <div class="paytable" id="pay-list"></div>
    <div class="slot-container" id="main-container">
        <div style="width:100%; display:flex; justify-content:space-between; padding:10px;">
            <button onclick="resetGame()" style="cursor:pointer; background: #822; color: white; border: none; padding: 5px 15px; border-radius: 5px;">RESET</button>
            <button onclick="closeUI()" style="cursor:pointer; background: #444; color: white; border: none; padding: 5px 15px; border-radius: 5px;">EXIT</button>
        </div>
        <div class="lcd"><div id="fever-label">🔥 FEVER TIME 🔥</div><div id="status-text">READY</div></div>
        <div class="reels">
            <div class="reel-box" id="rb0"><div id="s0" class="strip"></div></div>
            <div class="reel-box" id="rb1"><div id="s1" class="strip"></div></div>
            <div class="reel-box" id="rb2"><div id="s2" class="strip"></div></div>
        </div>
        <div class="stats"><div>coin: <span id="credit">100</span></div><div>BET: <span id="bet-val">3</span></div></div>
        <div style="margin-bottom:15px; color:white;">
            <button onclick="changeBet(-1)">-1</button><button onclick="changeBet(10)">+10</button>
            <button onclick="changeBet(1)">+1</button><button onclick="maxBet()">MAX</button>
        </div>
        <div class="lever" onclick="start()"></div>
        <div style="display:flex; gap:15px; margin-top:15px;">
            <button id="b0" class="stop-btn" disabled onclick="stopR(0)">STOP</button>
            <button id="b1" class="stop-btn" disabled onclick="stopR(1)">STOP</button>
            <button id="b2" class="stop-btn" disabled onclick="stopR(2)">STOP</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- スロットシステム (不変) ---
    const PAYS = { '7️⃣': 9, '⭐': 8, '💎': 7, '🎰': 6, '🔔': 5, '🍉': 4, '🍇': 3, '🍒': 2 };
    let REELS_DATA = [[], [], []], credit = 100, bet = 3, pos = [0,0,0], speed = [0,0,0], stopping = [false,false,false], targetPos = [0,0,0];
    let isFever = false, isSuperFever = false, feverRounds = 0;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, dur, vol=0.1) {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + dur);
    }
    const sounds = {
        stop: () => playTone(440, 'sine', 0.1),
        winLine: () => playTone(880, 'square', 0.2),
        coin: () => playTone(1200 + Math.random()*400, 'sine', 0.1, 0.05),
        fever: () => { playTone(523, 'triangle', 0.3); setTimeout(()=>playTone(659, 'triangle', 0.3), 150); }
    };

    function saveGame() { localStorage.setItem('slot_credit', credit); }
    function loadGame() { let s = localStorage.getItem('slot_credit'); if(s) { credit = parseInt(s); document.getElementById('credit').innerText = credit; } }
    function resetGame() { if(confirm("RESET?")) { credit = 100; saveGame(); document.getElementById('credit').innerText = credit; } }

    function dropCoins() {
        for(let i=0; i<30; i++) {
            setTimeout(() => {
                const coin = document.createElement('div');
                coin.className = 'coin-particle'; coin.innerText = '🪙';
                coin.style.left = Math.random() * 100 + 'vw';
                document.body.appendChild(coin); sounds.coin();
                setTimeout(() => coin.remove(), 2000);
            }, i * 50);
        }
    }

    function shuffleReels() {
        const normBase = ['🍒','🍒','🍒','🍒','🍇','🍇','🍉','🔔','💎','🍉'];
        const feverBase = ['7️⃣','7️⃣','7️⃣','⭐','⭐','🎰','🎰','💎','🍉','🍉'];
        const sfBase = ['7️⃣','7️⃣','7️⃣','7️⃣','🍒','🍒','🍒','🍒','7️⃣','🍒'];
        [0,1,2].forEach(i => {
            let base = isSuperFever ? sfBase : (isFever ? feverBase : normBase);
            REELS_DATA[i] = [...base, ...base].sort(()=>Math.random()-0.5);
            document.getElementById(`s${i}`).innerHTML = [...REELS_DATA[i], ...REELS_DATA[i]].map(s => `<div class="symbol">${s}</div>`).join('');
        });
    }

    function changeBet(n) { if(speed.some(s=>s>0)) return; bet = Math.max(1, Math.min(100, credit, bet+n)); document.getElementById('bet-val').innerText = bet; }
    function maxBet() { changeBet(100); }

    function start() {
        if(speed.some(s=>s>0) || credit < bet) return;
        if(audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('win-effect-container').innerHTML = '';
        if(feverRounds <= 0) { isFever = false; isSuperFever = false; document.getElementById('fever-label').style.visibility = 'hidden'; }
        shuffleReels(); credit -= bet; saveGame(); document.getElementById('credit').innerText = credit;
        let lbl = isSuperFever ? "SUPER" : "FEVER";
        document.getElementById('status-text').innerText = (isFever || isSuperFever) ? `${lbl} ${feverRounds}` : "SPINNING...";
        speed = [50+Math.random()*5, 50+Math.random()*5, 50+Math.random()*5];
        stopping = [false,false,false];
        [0,1,2].forEach(i => document.getElementById(`b${i}`).disabled = false);
        animate();
    }

    function stopR(i) { sounds.stop(); let cur = Math.abs(pos[i]); let idx = Math.ceil(cur/80)+1; targetPos[i] = -((idx+1)*80); stopping[i] = true; document.getElementById(`b${i}`).disabled = true; }

    function animate() {
        let m = false;
        [0,1,2].forEach(i => {
            if(speed[i] > 0) { m = true;
                if(stopping[i]) { let d = targetPos[i]-pos[i]; if(Math.abs(d)<1){pos[i]=targetPos[i]; speed[i]=0;} else pos[i]+=d*0.15; }
                else { pos[i]-=speed[i]; if(pos[i]<=-1600) pos[i]=0; }
                document.getElementById(`s${i}`).style.top = pos[i]+"px";
            }
        });
        if(m) requestAnimationFrame(animate); else if(stopping.every(s=>s)) check();
    }

    async function check() {
        const grid = [0,1,2].map(i => { let off = Math.abs(Math.round(pos[i]/80)); return [REELS_DATA[i][off%20], REELS_DATA[i][(off+1)%20], REELS_DATA[i][(off+2)%20]]; });
        const lines = [[grid[0][1], grid[1][1], grid[2][1]], [grid[0][0], grid[1][0], grid[2][0]], [grid[0][2], grid[1][2], grid[2][2]], [grid[0][0], grid[1][1], grid[2][2]], [grid[0][2], grid[1][1], grid[2][0]], [grid[0][0], grid[0][1], grid[0][2]], [grid[1][0], grid[1][1], grid[1][2]], [grid[2][0], grid[2][1], grid[2][2]]];
        let winCnt = 0, mults = [];
        lines.forEach(l => { if(l[0]===l[1] && l[1]===l[2]) { winCnt++; mults.push(PAYS[l[0]]); } });

        if(mults.length > 0) {
            const container = document.getElementById('win-effect-container');
            const mainContainer = document.getElementById('main-container');
            let currentTotal = 1;
            if(winCnt >= 2) dropCoins();
            for(let i=0; i<mults.length; i++) {
                const mult = mults[i];
                currentTotal *= mult;
                if(winCnt >= 2) {
                    const div = document.createElement('div');
                    div.className = 'win-pop'; div.innerText = i === 0 ? `${mult}倍！` : `× ${mult}倍！`;
                    container.appendChild(div); sounds.winLine();
                    mainContainer.style.animation = 'shake 0.1s infinite';
                    await new Promise(r => setTimeout(r, 600));
                    mainContainer.style.animation = '';
                }
            }
            const finalDiv = document.createElement('div');
            finalDiv.className = 'win-pop'; finalDiv.style.fontSize = '6rem'; finalDiv.style.color = 'gold';
            finalDiv.innerText = `合計 ${currentTotal}倍！！`;
            container.appendChild(finalDiv); sounds.winLine(); sounds.fever();
            credit += (bet * currentTotal);
            document.getElementById('credit').innerText = credit;
            saveGame();
            if(isSuperFever) { if(winCnt >= 2) feverRounds = 2; else feverRounds--; } 
            else {
                if(winCnt >= 2) { isSuperFever = true; isFever = false; feverRounds = 2; document.getElementById('fever-label').innerText = "🔥 SUPER FEVER 🔥"; document.getElementById('fever-label').style.visibility = 'visible'; }
                else { isFever = true; feverRounds = 3; document.getElementById('fever-label').innerText = "🔥 FEVER TIME 🔥"; document.getElementById('fever-label').style.visibility = 'visible'; }
            }
        } else { if(isFever || isSuperFever) feverRounds--; }
        if(feverRounds <= 0) { isFever = false; isSuperFever = false; document.getElementById('fever-label').style.visibility = 'hidden'; }
        let lbl = isSuperFever ? "SUPER" : "FEVER";
        document.getElementById('status-text').innerText = (isFever || isSuperFever) ? `${lbl} ${feverRounds}` : "RETRY";
        saveGame();
    }

    // --- Three.js (明るさを戻し、クリック判定を追加) ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x222222);
    document.getElementById('three-canvas').appendChild(renderer.domElement);

    // 照明 (明るく戻す)
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); scene.add(ambientLight);
    const mainLight = new THREE.PointLight(0xffffff, 1.2, 50); mainLight.position.set(0, 5, 0); scene.add(mainLight);

    const roomSize = { w: 30, h: 10, d: 50 };
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(roomSize.w, roomSize.d), new THREE.MeshStandardMaterial({ color: 0x444444 }));
    floor.rotation.x = -Math.PI / 2; floor.position.y = -5; scene.add(floor);
    const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(roomSize.w, roomSize.d), new THREE.MeshStandardMaterial({ color: 0x666666 }));
    ceiling.rotation.x = Math.PI / 2; ceiling.position.y = 5; scene.add(ceiling);
    const walls = [
        {pos: [0,0,-25], rot: [0,0,0]}, {pos: [0,0,25], rot: [0,Math.PI,0]},
        {pos: [-15,0,0], rot: [0,Math.PI/2,0]}, {pos: [15,0,0], rot: [0,-Math.PI/2,0]}
    ];
    walls.forEach(w => {
        const wall = new THREE.Mesh(new THREE.PlaneGeometry(30, 10), new THREE.MeshStandardMaterial({ color: 0x555555 }));
        if(w.pos[0]===0) wall.geometry = new THREE.PlaneGeometry(roomSize.w, 10);
        else wall.geometry = new THREE.PlaneGeometry(roomSize.d, 10);
        wall.position.set(...w.pos); wall.rotation.set(...w.rot); scene.add(wall);
    });

    // スロット台
    const machineObjects = [];
    function createMachine(x, z) {
        const group = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(2, 4.5, 1.5), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        group.add(body);
        const screen = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 2), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
        screen.position.set(0, 1, 0.76); group.add(screen);
        group.position.set(x, -2.75, z);
        scene.add(group);
        machineObjects.push(body);
    }
    createMachine(-10, -5); createMachine(-10, 0); createMachine(-10, 5);

    // 操作
    camera.position.set(0, 0, 15);
    let move = { f: false, b: false, l: false, r: false };
    let pitch = 0, yaw = 0, isMobile = false;
    let joyDir = { x: 0, y: 0 };

    function toggleMobile() {
        isMobile = !isMobile;
        document.getElementById('joystick-container').style.display = isMobile ? 'block' : 'none';
        if (!isMobile) document.exitPointerLock();
    }

    // マウスクリック判定 (中央の台をクリック)
    const raycaster = new THREE.Raycaster();
    document.addEventListener('mousedown', (e) => {
        if(document.getElementById('ui').classList.contains('active')) return;
        
        // レイキャストでスロット台が正面にあるか確認
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        const intersects = raycaster.intersectObjects(machineObjects);
        if (intersects.length > 0) {
            toggleSlot(true);
        } else if(!isMobile) {
            renderer.domElement.requestPointerLock();
        }
    });

    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement === renderer.domElement && !isMobile) {
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
        }
    });

    // スマホ用タッチ操作 (右半分で視点)
    let touchId = null, lastX, lastY;
    document.addEventListener('touchstart', (e) => {
        if(!isMobile) return;
        for(let t of e.changedTouches) {
            if(t.pageX > window.innerWidth/2) { touchId = t.identifier; lastX = t.pageX; lastY = t.pageY; }
        }
    });
    document.addEventListener('touchmove', (e) => {
        if(!isMobile) return;
        for(let t of e.changedTouches) {
            if(t.identifier === touchId) {
                yaw -= (t.pageX - lastX) * 0.005;
                pitch -= (t.pageY - lastY) * 0.005;
                lastX = t.pageX; lastY = t.pageY;
            }
        }
    });

    // ジョイスティック
    const joyKnob = document.getElementById('joystick-knob');
    document.getElementById('joystick-container').addEventListener('touchmove', (e) => {
        const t = e.touches[0];
        const rect = e.currentTarget.getBoundingClientRect();
        const centerX = rect.left + rect.width/2;
        const centerY = rect.top + rect.height/2;
        let dx = t.pageX - centerX;
        let dy = t.pageY - centerY;
        const dist = Math.min(60, Math.sqrt(dx*dx + dy*dy));
        const angle = Math.atan2(dy, dx);
        joyDir.x = Math.cos(angle) * (dist/60);
        joyDir.y = Math.sin(angle) * (dist/60);
        joyKnob.style.transform = `translate(calc(-50% + ${dx*(dist/60)}px), calc(-50% + ${dy*(dist/60)}px))`;
    });
    document.getElementById('joystick-container').addEventListener('touchend', () => {
        joyDir = {x:0, y:0}; joyKnob.style.transform = `translate(-50%, -50%)`;
    });

    document.addEventListener('keydown', (e) => {
        const k = e.key.toLowerCase();
        if(k === 'w') move.f = true; if(k === 's') move.b = true;
        if(k === 'a') move.l = true; if(k === 'd') move.r = true;
        if(k === 'e') toggleSlot(true);
    });
    document.addEventListener('keyup', (e) => {
        const k = e.key.toLowerCase();
        if(k === 'w') move.f = false; if(k === 's') move.b = false;
        if(k === 'a') move.l = false; if(k === 'd') move.r = false;
    });

    function toggleSlot(o){ 
        document.getElementById('ui').classList.toggle('active',o);
        if(o) document.exitPointerLock();
    }
    function closeUI(){ toggleSlot(false); }

    function initGame() {
        loadGame(); shuffleReels();
        document.getElementById('pay-list').innerHTML = "<b>PAY TABLE</b><hr>" + Object.entries(PAYS).reverse().map(([s, v]) => `<div class="pay-item"><span>${s}</span><span>x${v}</span></div>`).join('');
        loop();
    }

    function loop() {
        requestAnimationFrame(loop);
        if (!document.getElementById('ui').classList.contains('active')) {
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            const dir = new THREE.Vector3();
            if(isMobile) {
                dir.z = joyDir.y; dir.x = joyDir.x;
            } else {
                if(move.f) dir.z -= 1; if(move.b) dir.z += 1;
                if(move.l) dir.x -= 1; if(move.r) dir.x += 1;
            }
            dir.normalize().applyQuaternion(camera.quaternion);
            camera.position.addScaledVector(dir, 0.15);
            camera.position.y = 0;
        }
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
