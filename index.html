<script>
    // --- 通信 (あの日できたロジック完全復旧) ---
    const roomNum = prompt("部屋番号を入力してください", "777") || "777";
    const myId = "P" + Math.floor(Math.random() * 9000 + 1000);
    const hostId = "slot-room-" + roomNum + "-host";
    
    let peer = new Peer(myId);
    let connections = []; // 自分がホストの場合、全クライアントを保持
    let hostConn = null;  // 自分がクライアントの場合、ホストへの接続を保持
    const otherPlayers = {};

    peer.on('open', (id) => {
        document.getElementById('multi-status').innerText = `ID: ${id}\nROOM: ${roomNum}`;
        tryConnectHost();
    });

    function tryConnectHost() {
        const conn = peer.connect(hostId);
        conn.on('open', () => {
            hostConn = conn;
            setupConn(conn);
        });
        setTimeout(() => {
            if (!hostConn) startAsHost();
        }, 2000);
    }

    function startAsHost() {
        const hostPeer = new Peer(hostId);
        hostPeer.on('open', () => { 
            document.getElementById('multi-status').innerText = `HOSTING\nROOM: ${roomNum}`; 
        });
        hostPeer.on('connection', (conn) => {
            connections.push(conn);
            setupConn(conn);
        });
    }

    function setupConn(conn) {
        conn.on('data', (data) => {
            if (data.type === 'move') {
                updateAvatar(data);
                // ホストなら、受け取ったデータを他の全員に転送（中継）する
                if (peer.id === hostId) {
                    connections.forEach(c => {
                        if (c.open && c.peer !== conn.peer) c.send(data);
                    });
                }
            }
        });
    }

    function updateAvatar(data) {
        if (!otherPlayers[data.id]) {
            otherPlayers[data.id] = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.5, 1, 4, 8), 
                new THREE.MeshStandardMaterial({ color: 0x00aaff })
            );
            scene.add(otherPlayers[data.id]);
        }
        otherPlayers[data.id].position.set(data.x, data.y - 0.5, data.z);
        otherPlayers[data.id].rotation.y = data.ry;
    }

    function broadcast() {
        const data = { type: 'move', id: myId, x: camera.position.x, y: camera.position.y, z: camera.position.z, ry: camera.rotation.y };
        if (hostConn && hostConn.open) {
            hostConn.send(data);
        } else if (peer.id === hostId) {
            connections.forEach(c => { if(c.open) c.send(data); });
        }
    }
    // --- 以下、スロットと操作のロジックは一切変更なし ---
</script>
