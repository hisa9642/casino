<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>8-LINE ONLINE MULTI SLOT - Stable Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #ffd700; --fever: #ff0000; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; touch-action: none; }
        #world { width: 100vw; height: 100vh; perspective: 1200px; }
        #camera-offset { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #scene { position: relative; transform-style: preserve-3d; transition: transform 0.1s linear; }
        .part { position: absolute; transform-style: preserve-3d; }
        
        .floor { width: 5000px; height: 5000px; background: repeating-conic-gradient(#311 0% 25%, #200 0% 50%) 50% / 100px 100px; transform: rotateX(90deg) translate(-50%, -50%); box-shadow: inset 0 0 800px 200px rgba(0,0,0,0.9); }
        .machine { width: 180px; height: 280px; background: linear-gradient(135deg, #444, #111); border: 4px solid var(--gold); border-radius: 15px 15px 0 0; color: white; text-align: center; box-shadow: 0 0 40px rgba(255, 215, 0, 0.3); display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .avatar { width: 50px; height: 120px; background: #fff; border-radius: 10px; transform: translate3d(-50%, -100%, 0); box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .avatar.me { background: #0cf; border: 2px solid #fff; }
        .avatar-label { position: absolute; top: -35px; width: 120px; text-align: center; color: #fff; font-size: 12px; left: -35px; text-shadow: 0 0 5px #000; }
        .bubble { position: absolute; top: -80px; left: -50px; width: 150px; background: white; color: black; padding: 5px; border-radius: 10px; font-size: 12px; display: none; text-align: center; border: 2px solid #0cf; pointer-events: none; }

        #online-ui { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #fff; padding: 10px; border-radius: 10px; z-index: 5000; font-size: 12px; border: 1px solid #444; }
        #chat-ui { position: fixed; bottom: 10px; left: 10px; z-index: 5000; display: flex; flex-direction: column; width: 250px; }
        #chat-log { height: 80px; background: rgba(0,0,0,0.5); color: white; overflow-y: auto; font-size: 10px; padding: 5px; margin-bottom: 5px; border-radius: 5px; }
        #chat-input-row { display: flex; gap: 5px; }
        input { background: #222; color: #fff; border: 1px solid #666; padding: 5px; border-radius: 5px; outline: none; }

        #joy-pad { position: fixed; bottom: 120px; left: 30px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; z-index: 2000; border: 2px solid rgba(255,255,255,0.2); }
        #joy-stick { position: absolute; width: 40px; height: 40px; background: #fff; border-radius: 50%; top: 30px; left: 30px; }
        #btn-action { position: fixed; bottom: 30px; right: 30px; width: 90px; height: 90px; background: radial-gradient(#f00, #800); border-radius: 50%; z-index: 2000; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border: 4px solid #fff; cursor: pointer; }

        #ui { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 3000; transform: scale(0); transition: 0.3s; }
        #ui.active { transform: scale(1); pointer-events: auto; }
        .slot-container { width: 420px; height: 720px; background: #222; border: 8px solid #444; border-radius: 20px; display: flex; flex-direction: column; align-items: center; }
        .lcd { width: 85%; height: 90px; background: #000; margin-top: 15px; border: 4px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #status-text { color: #f00; font-size: 1.8rem; }
        .reels { display: flex; gap: 8px; background: #000; padding: 10px; margin: 10px 0; border: 4px solid #666; }
        .reel-box { width: 90px; height: 240px; background: #fff; overflow: hidden; position: relative; }
        .strip { position: absolute; width: 100%; top: 0; left: 0; }
        .symbol { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 3rem; border-bottom: 1px solid #ddd; }
        .stop-btn { width: 80px; height: 80px; border-radius: 50%; background: #ccc; border: 4px solid #999; font-weight: bold; }
        #win-effect-container { position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%); z-index: 4000; pointer-events: none; text-align: center; width: 100%; }
        .win-pop { color: #f00; font-size: 3.5rem; font-weight: bold; text-shadow: 0 0 15px #fff; animation: popIn 0.4s forwards; }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body onload="initApp()">

<div id="win-effect-container"></div>

<div id="online-ui">
    自分のID: <span id="my-peer-id" style="color:cyan;">接続中...</span><br>
    <input type="text" id="target-id" placeholder="相手のID">
    <button onclick="connectToPeer()">接続</button>
</div>

<div id="chat-ui">
    <div id="chat-log"></div>
    <div id="chat-input-row">
        <input type="text" id="chat-msg" placeholder="文字を入力" onkeydown="if(event.key==='Enter') sendChat()">
        <button onclick="sendChat()" style="background:#0cf; color:white; border:none; padding:5px 10px; border-radius:5px;">送信</button>
    </div>
</div>

<div id="world">
    <div id="camera-offset">
        <div id="scene">
            <div class="part floor"></div>
            <div id="my-avatar-pivot" class="part">
                <div class="avatar me"><div class="avatar-label">YOU</div><div id="my-bubble" class="bubble"></div></div>
            </div>
            <div id="others-layer"></div>
            <div class="part machine" style="transform: translate3d(0, -280px, -600px);">
                <h3 style="color:gold;">8-LINE SLOT</h3>
            </div>
        </div>
    </div>
</div>

<div id="joy-pad"><div id="joy-stick"></div></div>
<div id="btn-action">ACTION</div>

<div id="ui">
    <div class="slot-container">
        <div style="width:100%; display:flex; justify-content:flex-end; padding:10px;">
            <button onclick="toggleSlot(false)" style="background:#444; color:white; border:none; padding:8px; border-radius:5px;">閉じる</button>
        </div>
        <div class="lcd">
            <div id="fever-label" style="color:red; font-size:1rem; visibility:hidden;">🔥 FEVER 🔥</div>
            <div id="status-text">READY</div>
        </div>
        <div class="reels">
            <div class="reel-box"><div id="s0" class="strip"></div></div>
            <div class="reel-box"><div id="s1" class="strip"></div></div>
            <div class="reel-box"><div id="s2" class="strip"></div></div>
        </div>
        <div style="color:red; font-size:1.5rem; margin-bottom:10px;">COIN: <span id="credit">100</span></div>
        <div class="lever" onclick="startSlot()" style="width:60px; height:60px; background:red; border-radius:50%; border:4px solid white; cursor:pointer;"></div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button id="b0" class="stop-btn" disabled onclick="stopR(0)">STOP</button>
            <button id="b1" class="stop-btn" disabled onclick="stopR(1)">STOP</button>
            <button id="b2" class="stop-btn" disabled onclick="stopR(2)">STOP</button>
        </div>
    </div>
</div>

<script>
    let peer, conn, myPeerId;
    let others = {};

    function initApp() {
        // クラウドサーバーを安定設定で初期化
        peer = new Peer({
            host: '0.peerjs.com',
            port: 443,
            secure: true,
            debug: 1
        });

        peer.on('open', id => {
            myPeerId = id;
            document.getElementById('my-peer-id').innerText = id;
        });

        peer.on('connection', c => setupConn(c));

        // 通信が切れたら自動でリロード（利用期限対策）
        peer.on('error', err => {
            console.error(err);
            if(err.type === 'peer-unavailable') alert("相手が見つかりません");
            else location.reload(); 
        });

        initSlot();
        loop();
    }

    function connectToPeer() {
        const id = document.getElementById('target-id').value;
        if(id) setupConn(peer.connect(id));
    }

    function setupConn(c) {
        conn = c;
        conn.on('open', () => {
            document.getElementById('target-id').style.borderColor = "lime";
        });
        conn.on('data', data => {
            if(data.type === 'move') updateOtherPos(data.id, data.x, data.z);
            if(data.type === 'chat') showChat(data.id, data.msg);
        });
    }

    function sendChat() {
        const input = document.getElementById('chat-msg');
        const msg = input.value;
        if(!msg) return;
        if(conn && conn.open) conn.send({ type: 'chat', id: myPeerId, msg: msg });
        showChat('me', msg);
        input.value = '';
    }

    function showChat(id, msg) {
        const isMe = (id === 'me');
        const bubble = isMe ? document.getElementById('my-bubble') : document.querySelector(`#peer-${id} .bubble`);
        const log = document.getElementById('chat-log');
        const div = document.createElement('div');
        div.style.borderBottom = "1px solid #333";
        div.innerText = `${isMe ? "YOU" : id}: ${msg}`;
        log.appendChild(div); log.scrollTop = log.scrollHeight;
        if(bubble) {
            bubble.innerText = msg; bubble.style.display = 'block';
            setTimeout(() => bubble.style.display = 'none', 3000);
        }
    }

    function updateOtherPos(id, x, z) {
        let el = document.getElementById('peer-' + id);
        if(!el) {
            el = document.createElement('div'); el.id = 'peer-' + id; el.className = 'part';
            el.innerHTML = `<div class="avatar"><div class="avatar-label">${id}</div><div class="bubble"></div></div>`;
            document.getElementById('others-layer').appendChild(el);
        }
        el.style.transform = `translate3d(${x}px, 0, ${z}px)`;
    }

    // --- スロット復刻版 ---
    const PAYS = { '7️⃣': 9, '⭐': 8, '💎': 7, '🎰': 6, '🔔': 5, '🍉': 4, '🍇': 3, '🍒': 2 };
    let REELS_DATA = [[],[],[]], credit = 100, pos = [0,0,0], speed = [0,0,0], stopping = [false,false,false], targetPos = [0,0,0];
    let isFever = false, feverRounds = 0;

    function initSlot() {
        shuffleReels();
        const s = localStorage.getItem('slot_credit');
        if(s) { credit = parseInt(s); document.getElementById('credit').innerText = credit; }
    }

    function shuffleReels() {
        const n = ['🍒','🍒','🍇','🍉','🔔','💎','🎰','🍒','🍇','🍉'];
        const f = ['7️⃣','7️⃣','⭐','⭐','🎰','💎','7️⃣','⭐','🎰','🍉'];
        [0,1,2].forEach(i => {
            REELS_DATA[i] = [...(isFever?f:n)].sort(()=>Math.random()-0.5);
            document.getElementById(`s${i}`).innerHTML = [...REELS_DATA[i], ...REELS_DATA[i], ...REELS_DATA[i]].map(s => `<div class="symbol">${s}</div>`).join('');
        });
    }

    function startSlot() {
        if(speed.some(s=>s>0) || credit < 3) return;
        document.getElementById('win-effect-container').innerHTML = '';
        if(isFever && --feverRounds <= 0) { isFever = false; document.getElementById('fever-label').style.visibility = 'hidden'; }
        credit -= 3; document.getElementById('credit').innerText = credit;
        document.getElementById('status-text').innerText = "SPINNING";
        speed = [50, 50, 50]; stopping = [false,false,false];
        [0,1,2].forEach(i => document.getElementById(`b${i}`).disabled = false);
        animate();
    }

    function stopR(i) {
        let curr = Math.abs(pos[i]);
        targetPos[i] = -(Math.ceil(curr/80 + 2) * 80);
        stopping[i] = true; document.getElementById(`b${i}`).disabled = true;
    }

    function animate() {
        let moving = false;
        [0,1,2].forEach(i => {
            if(speed[i] > 0) {
                moving = true;
                if(stopping[i]) {
                    let d = targetPos[i] - pos[i];
                    if(Math.abs(d) < 1) { pos[i] = targetPos[i]; speed[i] = 0; } else pos[i] += d * 0.15;
                } else { pos[i] -= speed[i]; if(pos[i] <= -800) pos[i] = 0; }
                document.getElementById(`s${i}`).style.top = pos[i] + "px";
            }
        });
        if(moving) requestAnimationFrame(animate); else if(stopping.every(s=>s)) checkWin();
    }

    function checkWin() {
        const grid = [0,1,2].map(i => {
            let off = Math.abs(Math.round(pos[i]/80));
            return [REELS_DATA[i][off%10], REELS_DATA[i][(off+1)%10], REELS_DATA[i][(off+2)%10]];
        });
        const lines = [
            [grid[0][1], grid[1][1], grid[2][1]], [grid[0][0], grid[1][0], grid[2][0]], [grid[0][2], grid[1][2], grid[2][2]],
            [grid[0][0], grid[1][1], grid[2][2]], [grid[0][2], grid[1][1], grid[2][0]]
        ];
        let totalWin = 0;
        lines.forEach(l => { if(l[0]===l[1] && l[1]===l[2]) totalWin += PAYS[l[0]]; });

        if(totalWin > 0) {
            const div = document.createElement('div'); div.className = 'win-pop';
            div.innerText = `${totalWin}倍！`;
            document.getElementById('win-effect-container').appendChild(div);
            isFever = true; feverRounds = 3;
            document.getElementById('fever-label').style.visibility = 'visible';
            credit += (3 * totalWin); document.getElementById('credit').innerText = credit;
        }
        localStorage.setItem('slot_credit', credit);
    }

    // --- 操作 ---
    let myPos = { x: 0, z: 0 }, joy = { x: 0, y: 0, active: false };
    const pad = document.getElementById('joy-pad');
    pad.ontouchstart = () => joy.active = true;
    window.ontouchmove = e => {
        if(!joy.active) return;
        const r = pad.getBoundingClientRect(); const t = e.touches[0];
        joy.x = (t.clientX - (r.left + 50)) / 50; joy.y = (t.clientY - (r.top + 50)) / 50;
    };
    window.ontouchend = () => { joy.active = false; joy.x = joy.y = 0; };
    document.getElementById('btn-action').onclick = () => {
        if(Math.abs(myPos.x) < 200 && Math.abs(myPos.z + 600) < 200) toggleSlot(true);
    };
    function toggleSlot(o) { document.getElementById('ui').classList.toggle('active', o); }

    function loop() {
        if(!document.getElementById('ui').classList.contains('active')) {
            if(joy.x !== 0 || joy.y !== 0) {
                myPos.x += joy.x * 10; myPos.z += joy.y * 10;
                document.getElementById('my-avatar-pivot').style.transform = `translate3d(${myPos.x}px, 0, ${myPos.z}px)`;
                document.getElementById('scene').style.transform = `rotateX(-15deg) translateX(${-myPos.x}px) translateZ(${-myPos.z}px) translateY(200px)`;
                if(conn && conn.open) conn.send({ type: 'move', id: myPeerId, x: myPos.x, z: myPos.z });
            }
        }
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
