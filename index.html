<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>8-LINE SLOT - Realistic Studio</title>
    <style>
        :root { --gold: #ffd700; --fever: #ff0000; }
        body { margin: 0; overflow: hidden; background: #fff; font-family: 'Arial Black', sans-serif; touch-action: none; user-select: none; }
        #three-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        #mobile-toggle { position: fixed; top: 20px; left: 20px; z-index: 2000; padding: 10px 20px; background: #444; color: white; border: 2px solid #fff; border-radius: 5px; cursor: pointer; }
        #joystick-container { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(0,0,0,0.1); border-radius: 50%; z-index: 2000; display: none; }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(0,0,0,0.2); border-radius: 50%; transform: translate(-50%, -50%); }

        #ui { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 1000; transform: scale(0); transition: 0.3s; }
        #ui.active { transform: scale(1); pointer-events: auto; }
        .paytable { position: absolute; left: 20px; width: 180px; background: rgba(17, 17, 17, 0.95); border: 4px solid #444; border-radius: 10px; padding: 15px; color: gold; font-size: 1.1rem; }
        .pay-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 5px 0; }
        .slot-container { width: 480px; height: 780px; background: #222; border: 10px solid #444; border-radius: 20px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        
        #win-effect-container { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; pointer-events: none; text-align: center; width: 100%; }
        .win-pop { color: #ff0000; font-size: 4rem; font-weight: bold; text-shadow: 0 0 20px #fff, 0 0 40px gold; animation: popIn 0.5s forwards, fadeOut 0.5s 2.5s forwards; margin: 10px; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }
        
        .lcd { width: 85%; height: 110px; background: #000; margin-top: 25px; border: 4px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #fever-label { color: #f00; font-size: 1.6rem; visibility: hidden; animation: blink 0.4s infinite alternate; }
        #status-text { color: #f00; font-size: 2rem; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.1; } }
        .reels { display: flex; gap: 10px; background: #000; padding: 15px; margin: 20px 0; border: 6px solid #666; }
        .reel-box { width: 110px; height: 240px; background: #fff; overflow: hidden; position: relative; }
        .strip { position: absolute; width: 100%; top: 0; left: 0; }
        .symbol { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 3.2rem; border-bottom: 1px solid #ddd; box-sizing: border-box; color: #000; }
        .stats { color: #f00; font-size: 1.8rem; display: flex; gap: 30px; margin-bottom: 15px; }
        .lever { width: 65px; height: 65px; background: radial-gradient(#666, #222); border-radius: 50%; border: 4px solid #777; cursor: pointer; }
        .stop-btn { width: 95px; height: 95px; border-radius: 50%; background: #ccc; border: 6px solid #999; font-weight: bold; cursor: pointer; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; opacity: 0.8; }
    </style>
</head>
<body onload="initGame()" oncontextmenu="return false;">

<button id="mobile-toggle" onclick="toggleMobile()">г‚№гѓћгѓ›з”Ё ON/OFF</button>
<div id="joystick-container"><div id="joystick-knob"></div></div>
<div id="crosshair"></div>
<div id="win-effect-container"></div>
<div id="three-canvas"></div>

<div id="ui">
    <div class="paytable" id="pay-list"></div>
    <div class="slot-container" id="main-container">
        <div style="width:100%; display:flex; justify-content:space-between; padding:10px;">
            <button onclick="resetGame()" style="cursor:pointer; background: #822; color: white; border: none; padding: 5px 15px; border-radius: 5px;">RESET</button>
            <button onclick="closeUI()" style="cursor:pointer; background: #444; color: white; border: none; padding: 5px 15px; border-radius: 5px;">EXIT</button>
        </div>
        <div class="lcd"><div id="fever-label">рџ”Ґ FEVER TIME рџ”Ґ</div><div id="status-text">READY</div></div>
        <div class="reels">
            <div class="reel-box" id="rb0"><div id="s0" class="strip"></div></div>
            <div class="reel-box" id="rb1"><div id="s1" class="strip"></div></div>
            <div class="reel-box" id="rb2"><div id="s2" class="strip"></div></div>
        </div>
        <div class="stats"><div>coin: <span id="credit">100</span></div><div>BET: <span id="bet-val">3</span></div></div>
        <div style="margin-bottom:15px; color:white;">
            <button onclick="changeBet(-1)">-1</button><button onclick="changeBet(10)">+10</button>
            <button onclick="changeBet(1)">+1</button><button onclick="maxBet()">MAX</button>
        </div>
        <div class="lever" onclick="start()"></div>
        <div style="display:flex; gap:15px; margin-top:15px;">
            <button id="b0" class="stop-btn" disabled onclick="stopR(0)">STOP</button>
            <button id="b1" class="stop-btn" disabled onclick="stopR(1)">STOP</button>
            <button id="b2" class="stop-btn" disabled onclick="stopR(2)">STOP</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // --- г‚№гѓ­гѓѓгѓ€г‚·г‚№гѓ†гѓ  ---
    const PAYS = { '7пёЏвѓЈ': 9, 'в­ђ': 8, 'рџ’Ћ': 7, 'рџЋ°': 6, 'рџ””': 5, 'рџЌ‰': 4, 'рџЌ‡': 3, 'рџЌ’': 2 };
    let REELS_DATA = [[], [], []], credit = 100, bet = 3, pos = [0,0,0], speed = [0,0,0], stopping = [false,false,false], targetPos = [0,0,0];
    let isFever = false, isSuperFever = false, feverRounds = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, dur, vol=0.1) { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + dur); }
    const sounds = { stop: () => playTone(440, 'sine', 0.1), winLine: () => playTone(880, 'square', 0.2), coin: () => playTone(1200 + Math.random()*400, 'sine', 0.1, 0.05), fever: () => { playTone(523, 'triangle', 0.3); setTimeout(()=>playTone(659, 'triangle', 0.3), 150); } };
    function saveGame() { localStorage.setItem('slot_credit', credit); }
    function loadGame() { let s = localStorage.getItem('slot_credit'); if(s) { credit = parseInt(s); document.getElementById('credit').innerText = credit; } }
    function resetGame() { if(confirm("RESET?")) { credit = 100; saveGame(); document.getElementById('credit').innerText = credit; } }
    function shuffleReels() { const normBase = ['рџЌ’','рџЌ’','рџЌ’','рџЌ’','рџЌ‡','рџЌ‡','рџЌ‰','рџ””','рџ’Ћ','рџЌ‰']; const feverBase = ['7пёЏвѓЈ','7пёЏвѓЈ','7пёЏвѓЈ','в­ђ','в­ђ','рџЋ°','рџЋ°','рџ’Ћ','рџЌ‰','рџЌ‰']; const sfBase = ['7пёЏвѓЈ','7пёЏвѓЈ','7пёЏвѓЈ','7пёЏвѓЈ','рџЌ’','рџЌ’','рџЌ’','рџЌ’','7пёЏвѓЈ','рџЌ’']; [0,1,2].forEach(i => { let base = isSuperFever ? sfBase : (isFever ? feverBase : normBase); REELS_DATA[i] = [...base, ...base].sort(()=>Math.random()-0.5); document.getElementById(`s${i}`).innerHTML = [...REELS_DATA[i], ...REELS_DATA[i]].map(s => `<div class="symbol">${s}</div>`).join(''); }); }
    function changeBet(n) { if(speed.some(s=>s>0)) return; bet = Math.max(1, Math.min(100, credit, bet+n)); document.getElementById('bet-val').innerText = bet; }
    function maxBet() { changeBet(100); }
    function start() { if(speed.some(s=>s>0) || credit < bet) return; if(audioCtx.state === 'suspended') audioCtx.resume(); document.getElementById('win-effect-container').innerHTML = ''; if(feverRounds <= 0) { isFever = false; isSuperFever = false; document.getElementById('fever-label').style.visibility = 'hidden'; } shuffleReels(); credit -= bet; saveGame(); document.getElementById('credit').innerText = credit; let lbl = isSuperFever ? "SUPER" : "FEVER"; document.getElementById('status-text').innerText = (isFever || isSuperFever) ? `${lbl} ${feverRounds}` : "SPINNING..."; speed = [55, 55, 55]; stopping = [false,false,false]; [0,1,2].forEach(i => document.getElementById(`b${i}`).disabled = false); animate(); }
    function stopR(i) { sounds.stop(); let cur = Math.abs(pos[i]); let idx = Math.ceil(cur/80)+1; targetPos[i] = -((idx+1)*80); stopping[i] = true; document.getElementById(`b${i}`).disabled = true; }
    function animate() { let m = false; [0,1,2].forEach(i => { if(speed[i] > 0) { m = true; if(stopping[i]) { let d = targetPos[i]-pos[i]; if(Math.abs(d)<1){pos[i]=targetPos[i]; speed[i]=0;} else pos[i]+=d*0.15; } else { pos[i]-=speed[i]; if(pos[i]<=-1600) pos[i]=0; } document.getElementById(`s${i}`).style.top = pos[i]+"px"; } }); if(m) requestAnimationFrame(animate); else if(stopping.every(s=>s)) check(); }
    async function check() { const grid = [0,1,2].map(i => { let off = Math.abs(Math.round(pos[i]/80)); return [REELS_DATA[i][off%20], REELS_DATA[i][(off+1)%20], REELS_DATA[i][(off+2)%20]]; }); const lines = [[grid[0][1], grid[1][1], grid[2][1]], [grid[0][0], grid[1][0], grid[2][0]], [grid[0][2], grid[1][2], grid[2][2]], [grid[0][0], grid[1][1], grid[2][2]], [grid[0][2], grid[1][1], grid[2][0]], [grid[0][0], grid[0][1], grid[0][2]], [grid[1][0], grid[1][1], grid[1][2]], [grid[2][0], grid[2][1], grid[2][2]]]; let winCnt = 0, mults = []; lines.forEach(l => { if(l[0]===l[1] && l[1]===l[2]) { winCnt++; mults.push(PAYS[l[0]]); } }); if(mults.length > 0) { const container = document.getElementById('win-effect-container'); let currentTotal = 1; for(let i=0; i<mults.length; i++) { currentTotal *= mults[i]; if(winCnt >= 2) { const div = document.createElement('div'); div.className = 'win-pop'; div.innerText = i === 0 ? `${mults[i]}еЂЌпјЃ` : `Г— ${mults[i]}еЂЌпјЃ`; container.appendChild(div); sounds.winLine(); await new Promise(r => setTimeout(r, 600)); } } const finalDiv = document.createElement('div'); finalDiv.className = 'win-pop'; finalDiv.style.fontSize = '6rem'; finalDiv.style.color = 'gold'; finalDiv.innerText = `еђ€иЁ€ ${currentTotal}еЂЌпјЃпјЃ`; container.appendChild(finalDiv); sounds.winLine(); sounds.fever(); credit += (bet * currentTotal); document.getElementById('credit').innerText = credit; saveGame(); if(isSuperFever) { if(winCnt >= 2) feverRounds = 2; else feverRounds--; } else { if(winCnt >= 2) { isSuperFever = true; isFever = false; feverRounds = 2; document.getElementById('fever-label').innerText = "рџ”Ґ SUPER FEVER рџ”Ґ"; document.getElementById('fever-label').style.visibility = 'visible'; } else { isFever = true; feverRounds = 3; document.getElementById('fever-label').innerText = "рџ”Ґ FEVER TIME рџ”Ґ"; document.getElementById('fever-label').style.visibility = 'visible'; } } } else { if(isFever || isSuperFever) feverRounds--; } if(feverRounds <= 0) { isFever = false; isSuperFever = false; document.getElementById('fever-label').style.visibility = 'hidden'; } let lbl = isSuperFever ? "SUPER" : "FEVER"; document.getElementById('status-text').innerText = (isFever || isSuperFever) ? `${lbl} ${feverRounds}` : "RETRY"; saveGame(); }

    // --- Three.js з©єй–“ж§‹зЇ‰ ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById('three-canvas').appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // еЈЃпјљз™Ѕењ°гЃ«зґ°гЃ‹гЃ„зЃ°и‰ІгЃ®гѓ¬гѓіг‚¬
    const wallCanvas = document.createElement('canvas'); wallCanvas.width=512; wallCanvas.height=512;
    const wctx = wallCanvas.getContext('2d');
    wctx.fillStyle = '#ffffff'; wctx.fillRect(0,0,512,512);
    wctx.strokeStyle = '#bbbbbb'; wctx.lineWidth = 1;
    for(let i=0; i<32; i++) { // гЃ•г‚‰гЃ«зґ°гЃ‹гЃЏ
        const y = i * 16; wctx.beginPath(); wctx.moveTo(0, y); wctx.lineTo(512, y); wctx.stroke();
        const offset = (i % 2) * 16;
        for(let j=0; j<16; j++) { const x = j * 32 + offset; wctx.beginPath(); wctx.moveTo(x, y); wctx.lineTo(x, y+16); wctx.stroke(); }
    }
    const wallTex = new THREE.CanvasTexture(wallCanvas); wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping; wallTex.repeat.set(8, 2);
    const wallMat = new THREE.MeshStandardMaterial({ map: wallTex });

    // еєЉпјљзњџгЃЈй»’гЃЄж је­ђ
    const floorCanvas = document.createElement('canvas'); floorCanvas.width=512; floorCanvas.height=512;
    const fctx = floorCanvas.getContext('2d');
    fctx.fillStyle = '#050505'; fctx.fillRect(0,0,512,512);
    fctx.strokeStyle = '#1a1a1a'; fctx.lineWidth = 2;
    for(let i=0; i<16; i++){ fctx.beginPath(); fctx.moveTo(i*32, 0); fctx.lineTo(i*32, 512); fctx.stroke(); fctx.beginPath(); fctx.moveTo(0, i*32); fctx.lineTo(512, i*32); fctx.stroke(); }
    const floorTex = new THREE.CanvasTexture(floorCanvas); floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping; floorTex.repeat.set(4, 8);
    const floorMat = new THREE.MeshStandardMaterial({ map: floorTex });

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 60), floorMat); floor.rotation.x = -Math.PI/2; floor.position.y = -4; floor.receiveShadow = true; scene.add(floor);
    const sw1 = new THREE.Mesh(new THREE.PlaneGeometry(60, 15), wallMat); sw1.position.set(-10, 0, 0); sw1.rotation.y = Math.PI/2; scene.add(sw1);
    const sw2 = new THREE.Mesh(new THREE.PlaneGeometry(60, 15), wallMat); sw2.position.set(10, 0, 0); sw2.rotation.y = -Math.PI/2; scene.add(sw2);
    const bw = new THREE.Mesh(new THREE.PlaneGeometry(20, 15), wallMat); bw.position.set(0, 0, 30); bw.rotation.y = Math.PI; scene.add(bw);
    const fw = new THREE.Mesh(new THREE.PlaneGeometry(20, 15), wallMat); fw.position.set(0, 0, -30); scene.add(fw);

    // е¤©дє•
    const ceilMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const ceil = new THREE.Mesh(new THREE.PlaneGeometry(30, 60), ceilMat); ceil.rotation.x = Math.PI/2; ceil.position.y = 5; scene.add(ceil);

    const machines = [];
    function createMachine(x, z) {
        const group = new THREE.Group();
        // з­ђдЅ“гѓЎг‚¤гѓі
        const body = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 1.2), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.2 }));
        body.position.y = 2; body.castShadow = true; group.add(body);
        // гѓўгѓ‹г‚їгѓјпј€з™єе…‰пј‰
        const screen = new THREE.Mesh(new THREE.PlaneGeometry(1.7, 1.8), new THREE.MeshBasicMaterial({ color: 0x220000 }));
        screen.position.set(0, 2.8, 0.61); group.add(screen);
        // ж“ЌдЅњгѓ†гѓјгѓ–гѓ«
        const table = new THREE.Mesh(new THREE.BoxGeometry(2, 0.15, 0.8), new THREE.MeshStandardMaterial({ color: 0x444444 }));
        table.position.set(0, 1.2, 0.6); table.rotation.x = -0.2; group.add(table);
        // иЈ…йЈѕгѓ©гѓігѓ—
        const lamp = new THREE.Mesh(new THREE.BoxGeometry(2, 0.3, 1.2), new THREE.MeshStandardMaterial({ color: 0x330000 }));
        lamp.position.y = 4.15; group.add(lamp);

        group.position.set(x, -4, z);
        scene.add(group);
        machines.push({ pos: new THREE.Vector3(x, -4, z), mesh: body });
    }
    for(let i=-2; i<=2; i++) createMachine(-8.5, i*8);

    camera.position.set(0, -1, 15);
    let targetPitch = 0, targetYaw = 0, currentPitch = 0, currentYaw = 0, velocity = new THREE.Vector3(), moveDir = { f: false, b: false, l: false, r: false }, bobTime = 0;
    let isMobile = false, joyDir = {x:0, y:0};

    function toggleMobile() { isMobile = !isMobile; document.getElementById('joystick-container').style.display = isMobile ? 'block' : 'none'; }
    function toggleSlot(o){ document.getElementById('ui').classList.toggle('active',o); if(o) document.exitPointerLock(); }
    function closeUI(){ toggleSlot(false); }

    document.addEventListener('mousedown', () => {
        if(document.getElementById('ui').classList.contains('active')) return;
        const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
        if(ray.intersectObjects(machines.map(m=>m.mesh)).length > 0) toggleSlot(true);
        else if(!isMobile) renderer.domElement.requestPointerLock();
    });

    document.addEventListener('mousemove', (e) => { if (document.pointerLockElement === renderer.domElement) { targetYaw -= e.movementX * 0.002; targetPitch -= e.movementY * 0.002; targetPitch = Math.max(-1.5, Math.min(1.5, targetPitch)); } });
    document.addEventListener('keydown', (e) => { const k = e.key.toLowerCase(); if(k==='w')moveDir.f=true; if(k==='s')moveDir.b=true; if(k==='a')moveDir.l=true; if(k==='d')moveDir.r=true; });
    document.addEventListener('keyup', (e) => { const k = e.key.toLowerCase(); if(k==='w')moveDir.f=false; if(k==='s')moveDir.b=false; if(k==='a')moveDir.l=false; if(k==='d')moveDir.r=false; });

    function initGame() { loadGame(); shuffleReels(); document.getElementById('pay-list').innerHTML = "<b>PAY TABLE</b><hr>" + Object.entries(PAYS).reverse().map(([s, v]) => `<div class="pay-item"><span>${s}</span><span>x${v}</span></div>`).join(''); loop(); }

    function loop() {
        requestAnimationFrame(loop);
        if (!document.getElementById('ui').classList.contains('active')) {
            currentYaw += (targetYaw - currentYaw) * 0.15;
            currentPitch += (targetPitch - currentPitch) * 0.15;
            camera.rotation.set(currentPitch, currentYaw, 0, 'YXZ');

            let wishDir = new THREE.Vector3();
            if(moveDir.f) wishDir.z -= 1; if(moveDir.b) wishDir.z += 1; if(moveDir.l) wishDir.x -= 1; if(moveDir.r) wishDir.x += 1;
            wishDir.normalize().applyQuaternion(camera.quaternion); wishDir.y = 0;
            velocity.addScaledVector(wishDir, 0.02); velocity.multiplyScalar(0.85);

            // и¦–з‚№жЏєг‚ЊпјљгЃ—гЃЈгЃ‹г‚ЉгЃЁжЏєг‚‰гЃ™
            if (velocity.length() > 0.01) {
                bobTime += 0.15;
                camera.position.y = -1 + Math.sin(bobTime) * 0.06; // жЏєг‚Ње№…г‚’еў—еЉ 
            } else {
                camera.position.y += (-1 - camera.position.y) * 0.1;
            }

            camera.position.add(velocity);
            if(Math.abs(camera.position.x) > 9.5) camera.position.x = Math.sign(camera.position.x) * 9.5;
            if(Math.abs(camera.position.z) > 29.5) camera.position.z = Math.sign(camera.position.z) * 29.5;
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
