<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3D Slot Multiplayer Stable</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
body{margin:0;overflow:hidden;background:#000}
#multi-status{
position:fixed;bottom:10px;right:10px;
background:white;padding:10px;font-weight:bold;
}
</style>
</head>
<body>

<div id="multi-status">接続中...</div>

<script>
// =======================
// 3D空間
// =======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.set(0,1.5,5);

scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light=new THREE.DirectionalLight(0xffffff,0.8);
light.position.set(5,10,5);
scene.add(light);

const floor=new THREE.Mesh(
new THREE.PlaneGeometry(50,50),
new THREE.MeshStandardMaterial({color:0x444444})
);
floor.rotation.x=-Math.PI/2;
scene.add(floor);

// =======================
// マルチ安定版
// =======================

let room = prompt("部屋番号","1234") || "1234";
let hostId = "slot-room-" + room;
let peer;
let isHost=false;
let myId="";
let hostConn=null;

const connections=[];
const otherPlayers={};
const playerStates={};

// ホスト作成を試す
peer = new Peer(hostId);

peer.on("open",id=>{
    isHost=true;
    myId=id;
    document.getElementById("multi-status").innerText="ROOM:"+room+" (ホスト)";
    setupHost();
});

peer.on("error",err=>{
    if(err.type==="unavailable-id"){
        peer=new Peer();
        peer.on("open",id=>{
            myId=id;
            connectToHost();
        });
    }
});

function setupHost(){
    peer.on("connection",conn=>{
        conn.on("open",()=>{
            connections.push(conn);
            setupConnection(conn);
            document.getElementById("multi-status").innerText="ROOM:"+room+" (参加あり)";
            Object.values(playerStates).forEach(s=>conn.send(s));
        });
    });
}

function connectToHost(){
    hostConn=peer.connect(hostId);
    hostConn.on("open",()=>{
        document.getElementById("multi-status").innerText="ROOM:"+room+" (接続成功)";
        setupConnection(hostConn);
    });
}

function setupConnection(conn){
    conn.on("data",data=>{
        if(!data||data.type!=="move")return;
        updateAvatar(data.sid,data);
        playerStates[data.sid]=data;
        if(isHost){
            connections.forEach(c=>{
                if(c!==conn&&c.open)c.send(data);
            });
        }
    });
}

function updateAvatar(id,data){
    if(id===myId)return;
    if(!otherPlayers[id]){
        const geo=new THREE.CapsuleGeometry(0.5,1,4,8);
        const mat=new THREE.MeshStandardMaterial({
            color:Math.random()*0xffffff
        });
        const mesh=new THREE.Mesh(geo,mat);
        otherPlayers[id]=mesh;
        scene.add(mesh);
    }
    otherPlayers[id].position.set(data.x,data.y-1,data.z);
    otherPlayers[id].rotation.y=data.ry;
}

function broadcast(){
    if(!peer||!peer.open)return;
    const data={
        type:"move",
        sid:myId,
        x:camera.position.x,
        y:camera.position.y,
        z:camera.position.z,
        ry:camera.rotation.y
    };
    playerStates[myId]=data;
    if(isHost){
        connections.forEach(c=>{if(c.open)c.send(data);});
    }else if(hostConn&&hostConn.open){
        hostConn.send(data);
    }
}

// =======================
// 操作
// =======================

let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

let lastSend=0;

function animate(){
requestAnimationFrame(animate);

if(keys["w"])camera.position.z-=0.1;
if(keys["s"])camera.position.z+=0.1;
if(keys["a"])camera.position.x-=0.1;
if(keys["d"])camera.position.x+=0.1;

if(Date.now()-lastSend>40){
broadcast();
lastSend=Date.now();
}

renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
