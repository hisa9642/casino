<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>8-LINE SLOT & CUSTOM BJ</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --gold: #ffd700; --fever: #ff0000; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; touch-action: none; user-select: none; }
        #three-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #mobile-toggle { position: fixed; top: 20px; left: 20px; z-index: 2000; padding: 10px 20px; background: #444; color: white; border: 2px solid #fff; border-radius: 5px; cursor: pointer; }
        #joystick-container { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(0,0,0,0.2); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; z-index: 2000; display: none; }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #multi-status { position: fixed; bottom: 10px; right: 10px; z-index: 3000; color: #fff; background: rgba(0,0,0,0.7); padding: 10px; font-size: 12px; border-radius: 5px; white-space: pre-line; border: 1px solid #555; }
        #chat-ui { position: fixed; bottom: 100px; left: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 5px; }
        #chat-log { width: 250px; height: 120px; background: rgba(0,0,0,0.5); color: white; font-size: 12px; overflow-y: auto; padding: 5px; border-radius: 5px; }
        #chat-input { width: 250px; background: rgba(255,255,255,0.2); border: 1px solid #fff; color: white; border-radius: 5px; }

        #ui, #bj-ui { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 1000; transform: scale(0); transition: 0.3s; }
        #ui.active, #bj-ui.active { transform: scale(var(--ui-scale, 1)); pointer-events: auto; }
        .slot-container, .bj-container { width: 480px; height: 780px; background: #222; border: 10px solid #444; border-radius: 20px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); position: relative; }
        .bj-container { background: #0b2e0b; border-color: #265426; }
        
        .paytable { position: absolute; right: 100%; top: 50px; margin-right: 20px; width: 160px; background: rgba(17, 17, 17, 0.95); border: 4px solid #444; border-radius: 10px; padding: 15px; color: gold; font-size: 1rem; }
        .pay-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 5px 0; }
        #win-effect-container { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; pointer-events: none; text-align: center; width: 100%; }
        .win-pop { color: #ff0000; font-size: 4rem; font-weight: bold; text-shadow: 0 0 20px #fff, 0 0 40px gold; animation: popIn 0.5s forwards, fadeOut 0.5s 2.5s forwards; margin: 10px; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }
        .lcd { width: 85%; height: 110px; background: #000; margin-top: 25px; border: 4px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #fever-label { color: #f00; font-size: 1.6rem; visibility: hidden; animation: blink 0.4s infinite alternate; }
        #status-text { color: #f00; font-size: 2rem; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.1; } }
        .reels { display: flex; gap: 10px; background: #000; padding: 15px; margin: 20px 0; border: 6px solid #666; }
        .reel-box { width: 110px; height: 240px; background: #fff; overflow: hidden; position: relative; }
        .strip { position: absolute; width: 100%; top: 0; left: 0; }
        .symbol { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 3.2rem; border-bottom: 1px solid #ddd; box-sizing: border-box; color: #000; }
        .stats { color: #f00; font-size: 1.8rem; display: flex; gap: 30px; margin-bottom: 15px; }
        .lever { width: 65px; height: 65px; background: radial-gradient(#666, #222); border-radius: 50%; border: 4px solid #777; cursor: pointer; }
        .stop-btn { width: 95px; height: 95px; border-radius: 50%; background: #ccc; border: 6px solid #999; font-weight: bold; cursor: pointer; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; opacity: 0.8; }
        .card-row { display: flex; gap: 5px; min-height: 80px; }
        .card { width: 50px; height: 75px; background: white; border-radius: 5px; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
        .bj-btn { padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #444; color: #fff; border: 2px solid #888; border-radius: 5px; }
    </style>
</head>
<body onload="initGame()" oncontextmenu="return false;">

<button id="mobile-toggle" onclick="toggleMobile()">スマホ用 ON/OFF</button>
<div id="joystick-container"><div id="joystick-knob"></div></div>
<div id="crosshair"></div>
<div id="win-effect-container"></div>
<div id="three-canvas"></div>
<div id="multi-status">Initializing...</div>

<div id="chat-ui">
    <div id="chat-log"></div>
    <input type="text" id="chat-input" placeholder="Message..." onkeydown="if(event.key==='Enter')sendChat()">
</div>

<div id="ui">
    <div class="slot-container" id="main-container">
        <div class="paytable" id="pay-list"></div>
        <div style="width:100%; display:flex; justify-content:space-between; padding:10px; box-sizing:border-box;">
            <button onclick="resetGame()" style="cursor:pointer; background: #822; color: white; border: none; padding: 5px 15px; border-radius: 5px;">RESET</button>
            <button onclick="closeUI()" style="cursor:pointer; background: #444; color: white; border: none; padding: 5px 15px; border-radius: 5px;">EXIT</button>
        </div>
        <div class="lcd"><div id="fever-label">🔥 FEVER TIME 🔥</div><div id="status-text">READY</div></div>
        <div class="reels">
            <div class="reel-box" id="rb0"><div id="s0" class="strip"></div></div>
            <div class="reel-box" id="rb1"><div id="s1" class="strip"></div></div>
            <div class="reel-box" id="rb2"><div id="s2" class="strip"></div></div>
        </div>
        <div class="stats"><div>coin: <span id="credit">100</span></div><div>BET: <span id="bet-val">3</span></div></div>
        <div style="margin-bottom:15px; color:white;">
            <button onclick="changeBet(-1)">-1</button><button onclick="changeBet(10)">+10</button>
            <button onclick="changeBet(1)">+1</button><button onclick="maxBet()">MAX</button>
        </div>
        <div class="lever" onclick="start()"></div>
        <div style="display:flex; gap:15px; margin-top:15px;">
            <button id="b0" class="stop-btn" disabled onclick="stopR(0)">STOP</button>
            <button id="b1" class="stop-btn" disabled onclick="stopR(1)">STOP</button>
            <button id="b2" class="stop-btn" disabled onclick="stopR(2)">STOP</button>
        </div>
    </div>
</div>

<div id="bj-ui">
    <div class="bj-container">
        <div style="width:100%; display:flex; justify-content:flex-end; padding:10px; box-sizing:border-box;">
            <button onclick="closeBJ()" style="cursor:pointer; background: #444; color: white; border: none; padding: 5px 15px; border-radius: 5px;">EXIT</button>
        </div>
        <div id="bj-mode-select" class="bj-screen">
            <div style="color:gold; font-size:2rem;">BLACKJACK</div>
            <button class="bj-btn" onclick="setBJMode('cpu')">CPUと対戦</button>
            <button class="bj-btn" onclick="setBJMode('multi')">他プレイヤーと対戦</button>
        </div>
        <div id="bj-wait" class="bj-screen" style="display:none; color:white;">対戦相手を待機中...</div>
        <div id="bj-bet-select" class="bj-screen" style="display:none;">
            <div style="color:white;">BETを選択</div>
            <div style="color:red; font-size:1.5rem;">COIN: <span class="bj-coin-disp">0</span></div>
            <input type="range" id="bj-bet-range" min="1" max="100" value="10" oninput="document.getElementById('bj-bet-num').innerText=this.value">
            <div id="bj-bet-num" style="color:gold; font-size:2rem;">10</div>
            <button id="bj-start-btn" class="bj-btn" onclick="bjPreStart()">開始</button>
        </div>
        <div id="bj-game" class="bj-screen" style="display:none;">
            <div id="bj-opp-info" style="color:white;">Opponent: <span id="bj-opp-score">0</span></div>
            <div class="card-row" id="bj-opp-cards"></div>
            <hr style="width:80%;">
            <div class="card-row" id="bj-my-cards"></div>
            <div id="bj-my-info" style="color:gold;">YOU: <span id="bj-my-score">0</span></div>
            <div id="bj-controls" style="display:flex; gap:10px;">
                <button class="bj-btn" onclick="bjHit()">HIT</button>
                <button class="bj-btn" onclick="bjStand()">STAND</button>
            </div>
        </div>
    </div>
</div>

<script>
    const PAYS = { '7️⃣': 9, '⭐': 8, '💎': 7, '🎰': 6, '🔔': 5, '🍉': 4, '🍇': 3, '🍒': 2 };
    let REELS_DATA = [[], [], []], credit = 100, bet = 3, pos = [0,0,0], speed = [0,0,0], stopping = [false,false,false], targetPos = [0,0,0];
    let isFever = false, isSuperFever = false, feverRounds = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTone(freq, type, dur, vol=0.1) { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + dur); }
    const sounds = { stop: () => playTone(440, 'sine', 0.1), winLine: () => playTone(880, 'square', 0.2), coin: () => playTone(1200 + Math.random()*400, 'sine', 0.1, 0.05), fever: () => { playTone(523, 'triangle', 0.3); setTimeout(()=>playTone(659, 'triangle', 0.3), 150); } };
    function saveGame() { localStorage.setItem('slot_credit', credit); document.querySelectorAll('.bj-coin-disp').forEach(e=>e.innerText=credit); }
    function loadGame() { let s = localStorage.getItem('slot_credit'); if(s) credit = parseInt(s); document.getElementById('credit').innerText = credit; saveGame(); }
    function resetGame() { if(confirm("RESET?")) { credit = 100; saveGame(); document.getElementById('credit').innerText = credit; } }

    function initPaytable() {
        document.getElementById('pay-list').innerHTML = Object.entries(PAYS).map(([s, v]) => `<div class="pay-item"><span>${s}${s}${s}</span><span>${v}x</span></div>`).join('');
    }

    function shuffleReels() {
        const normBase = ['🍒','🍒','🍒','🍒','🍇','🍇','🍉','🔔','💎','🍉'];
        const feverBase = ['7️⃣','7️⃣','7️⃣','⭐','⭐','🎰','🎰','💎','🍉','🍉'];
        const sfBase = ['7️⃣','7️⃣','7️⃣','7️⃣','🍒','🍒','🍒','🍒','7️⃣','🍒'];
        [0,1,2].forEach(i => {
            let base = isSuperFever ? sfBase : (isFever ? feverBase : normBase);
            REELS_DATA[i] = [...base, ...base].sort(()=>Math.random()-0.5);
            document.getElementById(`s${i}`).innerHTML = [...REELS_DATA[i], ...REELS_DATA[i]].map(s => `<div class="symbol">${s}</div>`).join('');
        });
    }

    function changeBet(n) { if(speed.some(s=>s>0)) return; bet = Math.max(1, Math.min(100, credit, bet+n)); document.getElementById('bet-val').innerText = bet; }
    function maxBet() { changeBet(100); }
    function start() {
        if(speed.some(s=>s>0) || credit < bet) return;
        if(audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('win-effect-container').innerHTML = '';
        shuffleReels(); credit -= bet; saveGame(); document.getElementById('credit').innerText = credit;
        speed = [55, 55, 55]; stopping = [false,false,false];
        [0,1,2].forEach(i => document.getElementById(`b${i}`).disabled = false);
        animateSlot();
    }
    function stopR(i) { sounds.stop(); let cur = Math.abs(pos[i]); let idx = Math.ceil(cur/80)+1; targetPos[i] = -((idx+1)*80); stopping[i] = true; document.getElementById(`b${i}`).disabled = true; }
    function animateSlot() {
        let m = false;
        [0,1,2].forEach(i => { if(speed[i] > 0) { m = true; if(stopping[i]) { let d = targetPos[i]-pos[i]; if(Math.abs(d)<1){pos[i]=targetPos[i]; speed[i]=0;} else pos[i]+=d*0.15; } else { pos[i]-=speed[i]; if(pos[i]<=-1600) pos[i]=0; } document.getElementById(`s${i}`).style.top = pos[i]+"px"; } });
        if(m) requestAnimationFrame(animateSlot); else if(stopping.every(s=>s)) check();
    }
    async function check() {
        const grid = [0,1,2].map(i => { let off = Math.abs(Math.round(pos[i]/80)); return [REELS_DATA[i][off%20], REELS_DATA[i][(off+1)%20], REELS_DATA[i][(off+2)%20]]; });
        const lines = [[grid[0][1], grid[1][1], grid[2][1]], [grid[0][0], grid[1][0], grid[2][0]], [grid[0][2], grid[1][2], grid[2][2]], [grid[0][0], grid[1][1], grid[2][2]], [grid[0][2], grid[1][1], grid[2][0]], [grid[0][0], grid[0][1], grid[0][2]], [grid[1][0], grid[1][1], grid[1][2]], [grid[2][0], grid[2][1], grid[2][2]]];
        let winCnt = 0, mults = []; lines.forEach(l => { if(l[0]===l[1] && l[1]===l[2]) { winCnt++; mults.push(PAYS[l[0]]); } });
        if(mults.length > 0) {
            let totalMult = mults.reduce((a,b)=>a*b,1);
            credit += bet * totalMult; saveGame(); document.getElementById('credit').innerText = credit;
            const finalDiv = document.createElement('div'); finalDiv.className = 'win-pop'; finalDiv.innerText = `WIN ${totalMult}x!`; document.getElementById('win-effect-container').appendChild(finalDiv);
            sounds.fever();
        }
    }

    // --- BJ ---
    let bjMode = 'cpu', myCards = [], oppCards = [], bjDeck = [], bjBet = 10;
    function setBJMode(m) { bjMode = m; document.getElementById('bj-mode-select').style.display = 'none'; if(m==='multi') { document.getElementById('bj-wait').style.display='flex'; broadcast({type:'bj_join'}); } else showBJBet(); }
    function showBJBet() { document.getElementById('bj-wait').style.display='none'; document.getElementById('bj-bet-select').style.display='flex'; }
    function bjPreStart() { bjBet = parseInt(document.getElementById('bj-bet-range').value); if(credit < bjBet) return; credit -= bjBet; saveGame(); bjStart(); }
    function bjStart() {
        document.getElementById('bj-bet-select').style.display='none'; document.getElementById('bj-game').style.display='flex';
        myCards = []; oppCards = []; bjDeck = Array.from({length:52},(_,i)=>({v:(i%13)+1,s:['♠','♥','♦','♣'][Math.floor(i/13)]})).sort(()=>Math.random()-0.5);
        bjHit(); bjHit(); updateBJ();
    }
    function getBJS(cards) { let s = cards.reduce((a,c)=>a+(c.v>10?10:c.v===1?11:c.v),0); let aces = cards.filter(c=>c.v===1).length; while(s>21&&aces>0){s-=10;aces--;} return s; }
    function bjHit() { myCards.push(bjDeck.pop()); updateBJ(); if(getBJS(myCards)>21) bjEnd('LOSE'); }
    function bjStand() { if(bjMode==='cpu') { while(getBJS(oppCards)<17) oppCards.push(bjDeck.pop()); let ms=getBJS(myCards),os=getBJS(oppCards); if(os>21||ms>os) bjEnd('WIN'); else if(ms===os) bjEnd('DRAW'); else bjEnd('LOSE'); } else broadcast({type:'bj_stand', score:getBJS(myCards)}); }
    function bjEnd(res) { alert(res); if(res==='WIN') credit+=bjBet*2; if(res==='DRAW') credit+=bjBet; saveGame(); document.getElementById('bj-game').style.display='none'; setBJMode('cpu'); document.getElementById('bj-mode-select').style.display='flex'; }
    function updateBJ() {
        const render = (id, c) => document.getElementById(id).innerHTML = c.map(x=>`<div class="card" style="color:${(x.s==='♥'||x.s==='♦')?'red':'black'}">${x.v===1?'A':x.v>10?'JQK'[x.v-11]:x.v}<br>${x.s}</div>`).join('');
        render('bj-my-cards', myCards); render('bj-opp-cards', oppCards);
        document.getElementById('bj-my-score').innerText = getBJS(myCards); document.getElementById('bj-opp-score').innerText = getBJS(oppCards);
        if(bjMode==='multi') broadcast({type:'bj_sync', cards:myCards, score:getBJS(myCards)});
    }

    // --- 3D / PeerJS ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('three-canvas').appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const dl = new THREE.DirectionalLight(0xffffff, 0.8); dl.position.set(5, 10, 7); scene.add(dl);

    // 床・天井
    const createTex = (c1, c2) => {
        const can = document.createElement('canvas'); can.width=256; can.height=256; const ctx=can.getContext('2d');
        ctx.fillStyle=c1; ctx.fillRect(0,0,256,256); ctx.strokeStyle=c2; ctx.lineWidth=5; ctx.strokeRect(0,0,256,256);
        const tex = new THREE.CanvasTexture(can); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(10,20); return tex;
    };
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 60), new THREE.MeshStandardMaterial({map:createTex('#333','#444')}));
    floor.rotation.x = -Math.PI/2; floor.position.y = -4; scene.add(floor);
    const ceil = new THREE.Mesh(new THREE.PlaneGeometry(30, 60), new THREE.MeshStandardMaterial({map:createTex('#222','#111')}));
    ceil.rotation.x = Math.PI/2; ceil.position.y = 5; scene.add(ceil);

    const machines = [], bjTables = [], avatars = {};
    function createBox(x, z, color, isBJ) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 1.2), new THREE.MeshStandardMaterial({color}));
        m.position.set(x, -2, z); scene.add(m); if(isBJ) bjTables.push(m); else machines.push(m);
    }
    for(let i=-2; i<=2; i++) { createBox(-8.5, i*8, 0x111111, false); createBox(8.5, i*8, 0x073b07, true); }

    let roomNum = prompt("Room ID", "777") || "777";
    const myId = "P-" + roomNum + "-" + Math.floor(Math.random()*9999);
    const hostId = "ROOM-" + roomNum + "-HOST";
    const peer = new Peer(myId);
    let conns = [];

    peer.on('open', id => {
        updateStatus(`ID: ${id}\nRoom: ${roomNum}`);
        const c = peer.connect(hostId); setupConn(c);
    });
    const hostPeer = new Peer(hostId);
    hostPeer.on('connection', c => setupConn(c));

    function setupConn(c) {
        c.on('open', () => { if(!conns.find(x=>x.peer===c.peer)) conns.push(c); });
        c.on('data', data => {
            if(data.type==='move') {
                if(!avatars[data.id]) { avatars[data.id] = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshBasicMaterial({color:0x00ff00})); scene.add(avatars[data.id]); }
                avatars[data.id].position.set(data.x, data.y, data.z); avatars[data.id].rotation.y = data.ry;
                if(hostPeer.open) broadcast(data, c.peer);
            }
            if(data.type==='chat') addChat(data.msg, data.id);
            if(data.type==='bj_join') showBJBet();
            if(data.type==='bj_sync') { oppCards = data.cards; document.getElementById('bj-opp-score').innerText = data.score; updateBJ(); }
            if(data.type==='bj_stand') { let ms=getBJS(myCards); if(ms>data.score) bjEnd('WIN'); else if(ms===data.score) bjEnd('DRAW'); else bjEnd('LOSE'); }
        });
    }
    function broadcast(d, skipId) { conns.forEach(c => { if(c.open && c.peer !== skipId) c.send(d); }); }

    // --- 操作 ---
    let targetPitch=0, targetYaw=0, velocity=new THREE.Vector3(), moveDir={f:false,b:false,l:false,r:false}, isMobile=false, joyDir={x:0,y:0};
    camera.position.set(0, -1, 15);

    function toggleMobile() { isMobile=!isMobile; document.getElementById('joystick-container').style.display=isMobile?'block':'none'; }
    function closeUI(){ document.getElementById('ui').classList.remove('active'); }
    function closeBJ(){ document.getElementById('bj-ui').classList.remove('active'); }

    // スマホ視点移動 (スティック外のスワイプ)
    let touchStart={x:0,y:0};
    window.addEventListener('touchstart', e => { touchStart.x=e.touches[0].pageX; touchStart.y=e.touches[0].pageY; });
    window.addEventListener('touchmove', e => {
        if(isMobile && e.target.id !== 'joystick-container' && e.target.id !== 'joystick-knob') {
            let dx = e.touches[0].pageX - touchStart.x;
            let dy = e.touches[0].pageY - touchStart.y;
            targetYaw -= dx * 0.005; targetPitch -= dy * 0.005;
            touchStart.x = e.touches[0].pageX; touchStart.y = e.touches[0].pageY;
        }
    });

    document.addEventListener('mousedown', () => {
        if(document.getElementById('ui').classList.contains('active') || document.getElementById('bj-ui').classList.contains('active')) return;
        const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
        if(ray.intersectObjects(machines).length>0) { document.getElementById('ui').classList.add('active'); document.exitPointerLock(); }
        else if(ray.intersectObjects(bjTables).length>0) { document.getElementById('bj-ui').classList.add('active'); document.exitPointerLock(); }
        else if(!isMobile) renderer.domElement.requestPointerLock();
    });
    window.addEventListener('mousemove', e => { if(document.pointerLockElement===renderer.domElement) { targetYaw-=e.movementX*0.002; targetPitch-=e.movementY*0.002; } });
    window.onkeydown = e => { let k=e.key.toLowerCase(); if(k==='w')moveDir.f=true; if(k==='s')moveDir.b=true; if(k==='a')moveDir.l=true; if(k==='d')moveDir.r=true; };
    window.onkeyup = e => { let k=e.key.toLowerCase(); if(k==='w')moveDir.f=false; if(k==='s')moveDir.b=false; if(k==='a')moveDir.l=false; if(k==='d')moveDir.r=false; };

    function sendChat() { const i=document.getElementById('chat-input'); if(!i.value)return; broadcast({type:'chat', msg:i.value, id:myId}); addChat(i.value, "YOU"); i.value=''; }
    function addChat(m, id) { const l=document.getElementById('chat-log'); l.innerHTML += `<div><b>${id}:</b> ${m}</div>`; l.scrollTop=l.scrollHeight; }
    function updateStatus(t) { document.getElementById('multi-status').innerText = t; }

    function initGame() { loadGame(); initPaytable(); shuffleReels(); loop(); }
    function loop() {
        requestAnimationFrame(loop);
        if (!document.getElementById('ui').classList.contains('active') && !document.getElementById('bj-ui').classList.contains('active')) {
            camera.rotation.set(targetPitch, targetYaw, 0, 'YXZ');
            let wish = new THREE.Vector3();
            if(moveDir.f) wish.z-=1; if(moveDir.b) wish.z+=1; if(moveDir.l) wish.x-=1; if(moveDir.r) wish.x+=1;
            wish.normalize().applyQuaternion(camera.quaternion); wish.y=0;
            velocity.addScaledVector(wish, 0.02); velocity.multiplyScalar(0.85);
            camera.position.add(velocity);
            broadcast({type:'move', id:myId, x:camera.position.x, y:camera.position.y-1, z:camera.position.z, ry:camera.rotation.y});
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
