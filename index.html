<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>8-LINE SHUFFLE SLOT (High Production + Sound)</title>
    <style>
        :root { --gold: #ffd700; --fever: #ff0000; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        #world { width: 100vw; height: 100vh; perspective: 1200px; cursor: pointer; }
        #camera-offset { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #scene { position: relative; transform-style: preserve-3d; }
        .part { position: absolute; transform-style: preserve-3d; }
        
        .floor { width: 3000px; height: 3000px; background: repeating-conic-gradient(#311 0% 25%, #200 0% 50%) 50% / 100px 100px; transform: rotateX(90deg) translate(-50%, -50%); box-shadow: inset 0 0 800px 200px rgba(0,0,0,0.9); }
        .wall { width: 3000px; height: 1000px; background: linear-gradient(to bottom, #111 0%, #300 100%); border-bottom: 20px solid #000; transform: translate(-50%, -50%) translateZ(-1000px) translateY(400px); }
        .machine { width: 180px; height: 280px; background: linear-gradient(135deg, #444, #111); border: 4px solid var(--gold); border-radius: 15px 15px 0 0; color: white; text-align: center; box-shadow: 0 0 40px rgba(255, 215, 0, 0.3), inset 0 0 15px #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .machine h3 { margin: 0; color: #fff; text-shadow: 0 0 10px #f00, 0 0 20px #f00; font-size: 1.4rem; animation: blink 1s infinite alternate; }

        #ui { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 1000; transform: scale(0); transition: 0.3s; }
        #ui.active { transform: scale(1); pointer-events: auto; }
        .paytable { position: absolute; left: 20px; width: 180px; background: rgba(17, 17, 17, 0.95); border: 4px solid #444; border-radius: 10px; padding: 15px; color: gold; font-size: 1.1rem; pointer-events: auto; }
        .pay-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 5px 0; }
        .slot-container { width: 480px; height: 780px; background: #222; border: 10px solid #444; border-radius: 20px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); pointer-events: auto; }
        
        #win-effect-container { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; pointer-events: none; text-align: center; width: 100%; }
        .win-pop { color: #ff0000; font-size: 4rem; font-weight: bold; text-shadow: 0 0 20px #fff, 0 0 40px gold; animation: popIn 0.5s forwards, fadeOut 0.5s 2.5s forwards; margin: 10px; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }
        @keyframes shake { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(0, 0); } }
        
        .coin-particle { position: fixed; top: -50px; font-size: 2rem; z-index: 3000; pointer-events: none; animation: coinFall 1.5s linear forwards; }
        @keyframes coinFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

        .lcd { width: 85%; height: 110px; background: #000; margin-top: 25px; border: 4px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #fever-label { color: #f00; font-size: 1.6rem; visibility: hidden; animation: blink 0.4s infinite alternate; }
        #status-text { color: #f00; font-size: 2rem; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.1; } }
        .reels { display: flex; gap: 10px; background: #000; padding: 15px; margin: 20px 0; border: 6px solid #666; }
        .reel-box { width: 110px; height: 240px; background: #fff; overflow: hidden; position: relative; }
        .strip { position: absolute; width: 100%; top: 0; left: 0; }
        .symbol { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 3.2rem; border-bottom: 1px solid #ddd; box-sizing: border-box; }
        .stats { color: #f00; font-size: 1.8rem; display: flex; gap: 30px; margin-bottom: 15px; }
        .lever { width: 65px; height: 65px; background: radial-gradient(#666, #222); border-radius: 50%; border: 4px solid #777; cursor: pointer; transition: 0.1s; }
        .lever:active { transform: scale(0.9) translateY(5px); }
        .stop-btn { width: 95px; height: 95px; border-radius: 50%; background: #ccc; border: 6px solid #999; font-weight: bold; cursor: pointer; }
        .stop-btn:active:not(:disabled) { background: #666; }
    </style>
</head>
<body onload="initReels()">

<div id="win-effect-container"></div>
<div id="world" onclick="toggleSlot(true)">
    <div id="camera-offset">
        <div id="scene">
            <div class="part floor"></div>
            <div class="part wall"></div>
            <div class="part machine" style="transform: translate3d(-200px, -280px, -600px);">
                <h3>8-LINE SLOT</h3>
                <p>タップ or [E]で開始</p>
            </div>
        </div>
    </div>
</div>

<div id="ui">
    <div class="paytable" id="pay-list"></div>
    <div class="slot-container" id="main-container">
        <div style="width:100%; display:flex; justify-content:space-between; padding:10px;">
            <button onclick="resetGame()" style="cursor:pointer; background: #822; color: white; border: none; padding: 5px 15px; border-radius: 5px;">RESET</button>
            <button onclick="closeUI()" style="cursor:pointer; background: #444; color: white; border: none; padding: 5px 15px; border-radius: 5px;">EXIT</button>
        </div>
        <div class="lcd">
            <div id="fever-label">🔥 FEVER TIME 🔥</div>
            <div id="status-text">READY</div>
        </div>
        <div class="reels">
            <div class="reel-box" id="rb0"><div id="s0" class="strip"></div></div>
            <div class="reel-box" id="rb1"><div id="s1" class="strip"></div></div>
            <div class="reel-box" id="rb2"><div id="s2" class="strip"></div></div>
        </div>
        <div class="stats">
            <div>coin: <span id="credit">100</span></div>
            <div>BET: <span id="bet-val">3</span></div>
        </div>
        <div style="margin-bottom:15px; color:white;">
            <button onclick="changeBet(-1)">-1</button><button onclick="changeBet(10)">+10</button>
            <button onclick="changeBet(1)">+1</button><button onclick="maxBet()">MAX(100)</button>
        </div>
        <div class="lever" onclick="start()"></div>
        <div style="display:flex; gap:15px; margin-top:15px;">
            <button id="b0" class="stop-btn" disabled onclick="stopR(0)">STOP</button>
            <button id="b1" class="stop-btn" disabled onclick="stopR(1)">STOP</button>
            <button id="b2" class="stop-btn" disabled onclick="stopR(2)">STOP</button>
        </div>
    </div>
</div>

<script>
    const PAYS = { '7️⃣': 9, '⭐': 8, '💎': 7, '🎰': 6, '🔔': 5, '🍉': 4, '🍇': 3, '🍒': 2 };
    let REELS_DATA = [[], [], []];
    let credit = 100, bet = 3, pos = [0,0,0], speed = [0,0,0], stopping = [false,false,false], targetPos = [0,0,0];
    let isFever = false, feverRounds = 0;

    // --- Sound System ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, dur, vol=0.1) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }
    const sounds = {
        stop: () => playTone(440, 'sine', 0.1),
        winLine: () => playTone(880, 'square', 0.2),
        coin: () => playTone(1200 + Math.random()*400, 'sine', 0.1, 0.05),
        fever: () => { playTone(523.25, 'triangle', 0.3); setTimeout(()=>playTone(659.25, 'triangle', 0.3), 150); }
    };

    function saveGame() { localStorage.setItem('slot_credit', credit); }
    function loadGame() {
        const savedCredit = localStorage.getItem('slot_credit');
        if (savedCredit !== null) { credit = parseInt(savedCredit); document.getElementById('credit').innerText = credit; }
    }
    function resetGame() { if(confirm("データを削除して100coinに戻しますか？")) { credit = 100; saveGame(); document.getElementById('credit').innerText = credit; } }

    document.getElementById('pay-list').innerHTML = "<b>PAY TABLE</b><hr>" + 
        Object.entries(PAYS).reverse().map(([s, v]) => `<div class="pay-item"><span>${s}</span><span>x${v}</span></div>`).join('');

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function shuffleReels() {
        const normBase = ['🍒','🍒','🍒','🍒','🍇','🍇','🍉','🔔','💎','🍉'];
        const feverBase = ['7️⃣','7️⃣','7️⃣','⭐','⭐','🎰','🎰','💎','🍉','🍉'];
        [0,1,2].forEach(i => {
            REELS_DATA[i] = [...shuffle([...normBase]), ...shuffle([...feverBase])];
            const strip = document.getElementById(`s${i}`);
            const content = [...REELS_DATA[i], ...REELS_DATA[i], ...REELS_DATA[i]];
            strip.innerHTML = content.map(s => `<div class="symbol">${s}</div>`).join('');
        });
    }

    function initReels() { loadGame(); shuffleReels(); loop(); }
    function changeBet(n) { if(speed.some(s=>s>0)) return; bet = Math.max(1, Math.min(100, credit, bet+n)); document.getElementById('bet-val').innerText = bet; }
    function maxBet() { changeBet(100); }
    function clearWinEffects() { document.getElementById('win-effect-container').innerHTML = ''; }

    function dropCoins() {
        for(let i=0; i<30; i++) {
            setTimeout(() => {
                const coin = document.createElement('div');
                coin.className = 'coin-particle';
                coin.innerText = '🪙';
                coin.style.left = Math.random() * 100 + 'vw';
                document.body.appendChild(coin);
                sounds.coin();
                setTimeout(() => coin.remove(), 2000);
            }, i * 50);
        }
    }

    function start() {
        if(speed.some(s=>s>0) || credit < bet) return;
        if(audioCtx.state === 'suspended') audioCtx.resume();
        clearWinEffects();
        shuffleReels();
        if(isFever) {
            if(feverRounds <= 0) { isFever = false; document.getElementById('fever-label').style.visibility = 'hidden'; }
        }
        credit -= bet;
        saveGame();
        document.getElementById('credit').innerText = credit;
        document.getElementById('status-text').innerText = isFever ? `FEVER ${4-feverRounds}/3` : "SPINNING...";
        speed = [50 + Math.random()*5, 50 + Math.random()*5, 50 + Math.random()*5];
        stopping = [false, false, false];
        [0,1,2].forEach(i => document.getElementById(`b${i}`).disabled = false);
        animate();
    }

    function stopR(i) {
        sounds.stop();
        let currentY = Math.abs(pos[i]);
        let startIdx = Math.ceil(currentY / 80) + 1;
        for(let s = 0; s < 40; s++) {
            let idx = (startIdx + s) % 20;
            let found = isFever ? (idx >= 10 && idx <= 19) : (idx >= 0 && idx <= 9);
            if(found) {
                targetPos[i] = -( (startIdx + s) * 80 );
                stopping[i] = true;
                document.getElementById(`b${i}`).disabled = true;
                return;
            }
        }
    }

    function animate() {
        let moving = false;
        [0,1,2].forEach(i => {
            if(speed[i] > 0) {
                moving = true;
                if(stopping[i]) {
                    let dist = targetPos[i] - pos[i];
                    if(Math.abs(dist) < 1) { pos[i] = targetPos[i]; speed[i] = 0; }
                    else { pos[i] += dist * 0.15; }
                } else {
                    pos[i] -= speed[i];
                    if(pos[i] <= -1600) pos[i] = 0;
                }
                document.getElementById(`s${i}`).style.top = pos[i] + "px";
            }
        });
        if(moving) requestAnimationFrame(animate);
        else if(stopping.every(s=>s)) check();
    }

    async function check() {
        const grid = [0,1,2].map(i => {
            let off = Math.abs(Math.round(pos[i]/80));
            return [REELS_DATA[i][off % 20], REELS_DATA[i][(off+1) % 20], REELS_DATA[i][(off+2) % 20]];
        });
        const lines = [
            [grid[0][1], grid[1][1], grid[2][1]], [grid[0][0], grid[1][0], grid[2][0]], [grid[0][2], grid[1][2], grid[2][2]],
            [grid[0][0], grid[1][1], grid[2][2]], [grid[0][2], grid[1][1], grid[2][0]],
            [grid[0][0], grid[0][1], grid[0][2]], [grid[1][0], grid[1][1], grid[1][2]], [grid[2][0], grid[2][1], grid[2][2]]
        ];
        
        let winMults = [];
        lines.forEach(l => { if(l[0] === l[1] && l[1] === l[2]) winMults.push(PAYS[l[0]]); });

        if(winMults.length > 0) {
            const container = document.getElementById('win-effect-container');
            const mainContainer = document.getElementById('main-container');
            let currentTotal = 1;
            
            if(winMults.length >= 2) dropCoins();

            for(let i=0; i<winMults.length; i++) {
                const mult = winMults[i];
                currentTotal *= mult;
                // 2個以上のときだけ「何倍！」を表示
                if(winMults.length >= 2) {
                    const div = document.createElement('div');
                    div.className = 'win-pop';
                    div.innerText = i === 0 ? `${mult}倍！` : `× ${mult}倍！`;
                    container.appendChild(div);
                    sounds.winLine();
                    mainContainer.style.animation = 'shake 0.1s infinite';
                    await new Promise(r => setTimeout(r, 600));
                    mainContainer.style.animation = '';
                }
            }

            const finalDiv = document.createElement('div');
            finalDiv.className = 'win-pop';
            finalDiv.style.fontSize = '6rem';
            finalDiv.style.color = 'gold';
            finalDiv.innerText = `合計 ${currentTotal}倍！！`;
            container.appendChild(finalDiv);
            sounds.winLine(); sounds.fever();

            isFever = true; feverRounds = 3;
            document.getElementById('fever-label').style.visibility = 'visible';
            let win = bet * currentTotal;
            document.getElementById('status-text').innerText = `WIN: ${win}`;
            
            let c = 0; 
            const t = setInterval(() => { 
                credit++; c++; 
                document.getElementById('credit').innerText = credit; 
                if(c >= win) { clearInterval(t); saveGame(); } 
            }, 5);
        } else {
            if(isFever) feverRounds--;
            document.getElementById('status-text').innerText = (isFever && feverRounds >= 0) ? `FEVER ${4-feverRounds}/3` : "RETRY";
            saveGame();
        }
    }

    let wx=0, wz=0, keys={};
    window.onkeydown=e=>{ keys[e.key.toLowerCase()]=true; if(e.key==='e') toggleSlot(true); };
    window.onkeyup=e=>keys[e.key.toLowerCase()]=false;
    function toggleSlot(o){ document.getElementById('ui').classList.toggle('active',o); }
    function closeUI(){ toggleSlot(false); }
    function loop() {
        if(!document.getElementById('ui').classList.contains('active')) {
            if(keys['w']) wz+=8; if(keys['s']) wz-=8; if(keys['a']) wx+=8; if(keys['d']) wx-=8;
            document.getElementById('scene').style.transform = `rotateX(-15deg) translateX(${wx}px) translateZ(${wz}px) translateY(200px)`;
        }
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
