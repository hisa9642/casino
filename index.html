<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>8-LINE SLOT - Absolute Visibility</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #debug-log { 
            position: fixed; bottom: 10px; left: 10px; width: 300px; height: 150px;
            background: rgba(0,0,0,0.8); color: #0f0; font-size: 10px; padding: 10px;
            overflow-y: auto; z-index: 1000; pointer-events: none; border: 1px solid #0f0;
        }
        #ui-layer { position: fixed; top: 10px; right: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; z-index: 1000; border-radius: 8px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div>ROOM: <span id="room-display">-</span></div>
    <div>STATUS: <span id="status-display">待機中</span></div>
    <div>PLAYER: <span id="count-display">0</span>人</div>
</div>
<div id="debug-log">--- DEBUG LOG ---<br></div>

<script>
// --- 基本設定 ---
const roomNum = prompt("部屋番号を入力", "777") || "777";
const myId = "P" + Math.floor(Math.random() * 9000 + 1000);
const hostId = "slot-room-" + roomNum + "-host";
document.getElementById('room-display').innerText = roomNum;

function log(msg) {
    const div = document.getElementById('debug-log');
    div.innerHTML += `> ${msg}<br>`;
    div.scrollTop = div.scrollHeight;
    console.log(msg);
}

// --- 3D描画 (絶対に映る設定) ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x222222);
document.body.appendChild(renderer.domElement);

// ライトなしでも見える素材 (MeshBasicMaterial) を使用
const floor = new THREE.Mesh(
    new THREE.GridHelper(100, 50, 0xffffff, 0x444444),
    new THREE.MeshBasicMaterial({ visible: false }) // GridHelperを表示するためのダミー
);
scene.add(new THREE.GridHelper(100, 50, 0x00ff00, 0x222222));

camera.position.set(0, 1.6, 5);

const avatars = {};

function addAvatar(id) {
    log(`アバター作成開始: ${id}`);
    // ライト不要の「発光する箱」にする
    const geometry = new THREE.BoxGeometry(1, 2, 1);
    const material = new THREE.MeshBasicMaterial({ color: Math.random() * 0xffffff });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.y = 1;
    scene.add(mesh);
    avatars[id] = mesh;
    return mesh;
}

// --- 通信 (PeerJS) ---
let peer = new Peer(myId);
let connections = [];

peer.on('open', (id) => {
    log(`自分のID: ${id}`);
    tryConnectHost();
});

function tryConnectHost() {
    const conn = peer.connect(hostId);
    setupConnection(conn);

    // ホストになれるかチェック（数秒後に接続できてなければ自分がホスト）
    setTimeout(() => {
        if (connections.length === 0) {
            log("ホストが見つかりません。自分がホストになります...");
            startAsHost();
        }
    }, 3000);
}

function startAsHost() {
    const hostPeer = new Peer(hostId);
    hostPeer.on('open', () => {
        document.getElementById('status-display').innerText = "HOST";
        log("ホストとして待機中...");
    });
    hostPeer.on('connection', (conn) => {
        log(`プレイヤー参加: ${conn.peer}`);
        setupConnection(conn);
    });
}

function setupConnection(conn) {
    conn.on('open', () => {
        if (!connections.find(c => c.peer === conn.peer)) {
            connections.push(conn);
        }
        document.getElementById('status-display').innerText = "CONNECTED";
        document.getElementById('count-display').innerText = connections.length;
        log(`${conn.peer} と接続完了`);
    });

    conn.on('data', (data) => {
        if (data.type === 'move') {
            if (!avatars[data.id]) {
                addAvatar(data.id);
            }
            // 座標を強制的に適用
            avatars[data.id].position.set(data.x, data.y, data.z);
            avatars[data.id].rotation.y = data.ry;
        }
    });
}

function broadcast() {
    const data = {
        type: 'move',
        id: myId,
        x: camera.position.x,
        y: camera.position.y - 1, // 地面との調整
        z: camera.position.z,
        ry: camera.rotation.y
    };
    connections.forEach(c => {
        if (c.open) c.send(data);
    });
}

// --- 操作 ---
const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

document.addEventListener('mousedown', () => renderer.domElement.requestPointerLock());

function updateMovement() {
    const speed = 0.1;
    const direction = new THREE.Vector3();
    if (keys['KeyW']) direction.z -= speed;
    if (keys['KeyS']) direction.z += speed;
    if (keys['KeyA']) direction.x -= speed;
    if (keys['KeyD']) direction.x += speed;

    direction.applyQuaternion(camera.quaternion);
    direction.y = 0;
    camera.position.add(direction);
}

// --- ループ ---
function animate() {
    requestAnimationFrame(animate);
    updateMovement();
    
    // 自分の回転を更新
    if (document.pointerLockElement === renderer.domElement) {
        // マウス移動は省略せずに実装が必要
    }

    if (connections.length > 0) {
        broadcast();
    }
    
    renderer.render(scene, camera);
}

// マウス視点移動
window.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement === renderer.domElement) {
        camera.rotation.y -= e.movementX * 0.002;
    }
});

animate();

// ウィンドウリサイズ対応
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
