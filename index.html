<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Casino - Custom BJ & Reels</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; user-select: none; }
        #three-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #multi-status { position: fixed; top: 10px; right: 10px; z-index: 3000; color: #0f0; background: rgba(0,0,0,0.8); padding: 8px; font-size: 11px; border-radius: 5px; pointer-events: none; }
        
        .game-ui { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 1000; transform: scale(0); transition: 0.2s; }
        .game-ui.active { transform: scale(var(--ui-scale, 1)); pointer-events: auto; }
        .panel { width: 400px; background: rgba(10, 25, 10, 0.95); border: 4px solid #5d4037; border-radius: 20px; padding: 20px; color: white; text-align: center; }
        
        .bet-input { width: 100px; font-size: 24px; text-align: center; background: #222; color: #fff; border: 2px solid gold; margin: 15px; }
        .fever-msg { font-size: 32px; color: #ff0; text-shadow: 0 0 10px red; font-weight: bold; margin-bottom: 10px; }
        
        #joystick-container { position: fixed; bottom: 30px; right: 30px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; z-index: 2000; }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #chat-container { position: fixed; bottom: 20px; left: 20px; z-index: 3000; width: 220px; }
        #chat-log { height: 80px; background: rgba(0,0,0,0.6); color: #fff; font-size: 11px; overflow-y: auto; padding: 5px; border-radius: 5px; margin-bottom: 5px; }
        #chat-input { width: 100%; padding: 8px; background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body onload="initAll()">

<div id="joystick-container"><div id="joystick-knob"></div></div>
<div id="multi-status">Connecting...</div>
<div id="three-canvas"></div>

<div id="chat-container">
    <div id="chat-log"></div>
    <input type="text" id="chat-input" placeholder="Message..." onkeydown="if(event.key==='Enter') sendChat()">
</div>

<div id="ui-bj" class="game-ui">
    <div class="panel">
        <div style="text-align:right;"><button onclick="closeAllUI()">EXIT</button></div>
        
        <div id="bj-menu">
            <h2>BLACKJACK FEVER</h2>
            <button onclick="bjSelectMode('cpu')" style="padding:15px; margin:10px; width:150px;">CPU対戦</button>
            <button onclick="bjSelectMode('multi')" style="padding:15px; margin:10px; width:150px;">マルチプレイ</button>
        </div>

        <div id="bj-wait" style="display:none;"><p>対戦相手を待っています...</p></div>

        <div id="bj-bet" style="display:none;">
            <div id="fever-notice" class="fever-msg" style="display:none;">🔥 FEVER X<span id="fever-val">1</span> 🔥</div>
            <h3>BET (1-100)</h3>
            <input type="number" id="bet-val" class="bet-input" value="10" min="1" max="100">
            <br><button id="btn-bet-confirm" onclick="bjConfirmBet()" style="padding:10px 30px;">決定</button>
        </div>

        <div id="bj-game" style="display:none;">
            <div style="display:flex; justify-content:space-around; margin-bottom:10px;">
                <div>OPP: <span id="score-opp">0</span></div>
                <div>YOU: <span id="score-you">0</span></div>
            </div>
            <div id="bj-result" style="font-weight:bold; color:yellow; height:30px;"></div>
            <div class="bj-btns" style="margin-top:15px;">
                <button id="btn-hit" onclick="bjHit()" style="padding:12px 25px; background:green; color:white;">HIT</button>
                <button id="btn-stand" onclick="bjStand()" style="padding:12px 25px; background:blue; color:white;">STAND</button>
            </div>
        </div>
    </div>
</div>

<script>
    let credit = 100;
    let bjMode = '', bjFeverMult = 1, currentBet = 0;
    let myScore = 0, oppScore = 0, myCards = [], oppCards = [];
    
    // --- 3D SCENE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('three-canvas').appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(5, 10, 7); scene.add(sun);

    // Floor (Checkered)
    const floorGeo = new THREE.PlaneGeometry(100, 100, 20, 20);
    const floorMat = new THREE.MeshStandardMaterial({ vertexColors: true });
    const colors = [];
    for(let i=0; i<=20; i++) for(let j=0; j<=20; j++) {
        const c = (i+j)%2===0 ? 0.4 : 0.2; colors.push(c,c,c);
    }
    floorGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI/2; floor.position.y = -4; scene.add(floor);

    // Machines
    const slotReels = [];
    function createSlot(x, z) {
        const g = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(3, 5, 2), new THREE.MeshStandardMaterial({color: 0x222}));
        g.add(body);
        for(let i=0; i<3; i++) {
            const r = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.6, 16), new THREE.MeshStandardMaterial({color: 0xfff}));
            r.rotation.z = Math.PI/2; r.position.set((i-1)*0.8, 0.5, 0.8);
            g.add(r); slotReels.push(r);
        }
        g.position.set(x, -1.5, z); g.userData = {type: 'slot'}; scene.add(g); return g;
    }
    
    const bjCards3D = [];
    function createBJTable(x, z) {
        const g = new THREE.Group();
        const t = new THREE.Mesh(new THREE.CylinderGeometry(3.5, 3, 0.4, 32), new THREE.MeshStandardMaterial({color: 0x052}));
        t.position.y = -1.8; g.add(t);
        g.position.set(x, -1, z); g.userData = {type: 'bj'}; scene.add(g); return g;
    }

    createSlot(-6, 0); createBJTable(6, 0);

    // --- BJ LOGIC ---
    function bjSelectMode(m) {
        bjMode = m;
        document.getElementById('bj-menu').style.display = 'none';
        if(m === 'multi') {
            document.getElementById('bj-wait').style.display = 'block';
            setTimeout(() => { // 接続偽装
                document.getElementById('bj-wait').style.display = 'none';
                showBetPhase();
            }, 1500);
        } else { showBetPhase(); }
    }

    function showBetPhase() {
        document.getElementById('bj-bet').style.display = 'block';
        const notice = document.getElementById('fever-notice');
        if(bjFeverMult > 1) {
            notice.style.display = 'block';
            document.getElementById('fever-val').innerText = bjFeverMult;
        } else { notice.style.display = 'none'; }
        // ベットボタン制御
        document.getElementById('btn-bet-confirm').style.display = (credit >= 1) ? 'inline-block' : 'none';
    }

    function bjConfirmBet() {
        const v = parseInt(document.getElementById('bet-val').value);
        if(v < 1 || v > 100 || v > credit) return;
        currentBet = v; credit -= v; updateCredit();
        document.getElementById('bj-bet').style.display = 'none';
        document.getElementById('bj-game').style.display = 'block';
        bjInitGame();
    }

    function bjInitGame() {
        myScore = 0; oppScore = 0; myCards = []; oppCards = [];
        document.getElementById('bj-result').innerText = "";
        document.getElementById('btn-hit').disabled = false;
        document.getElementById('btn-stand').disabled = false;
        clearCards3D(); updateBJUI();
    }

    function bjHit() {
        const n = Math.floor(Math.random()*11)+1;
        myScore += n; addCard3D(n, true);
        updateBJUI();
        if(myScore >= 21) bjCheckFeverOrBust();
    }

    function bjCheckFeverOrBust() {
        document.getElementById('btn-hit').disabled = true;
        if(myScore === 21) {
            document.getElementById('bj-result').innerText = "FEVER!! 21!";
            bjFeverMult *= 10;
            setTimeout(() => { closeAllUI(); openBJ(); }, 2000);
        } else { bjStand(); }
    }

    function bjStand() {
        document.getElementById('btn-hit').disabled = true;
        document.getElementById('btn-stand').disabled = true;
        while(oppScore < 17) {
            const n = Math.floor(Math.random()*11)+1;
            oppScore += n; addCard3D(n, false);
        }
        updateBJUI();
        bjEnd();
    }

    function bjEnd() {
        let win = false;
        const res = document.getElementById('bj-result');
        if(myScore > 21) res.innerText = "BUST!";
        else if(oppScore > 21 || myScore > oppScore) { win = true; res.innerText = "WIN!"; }
        else if(myScore < oppScore) res.innerText = "LOSE";
        else { res.innerText = "DRAW"; credit += currentBet; }

        if(win) {
            credit += currentBet * (bjFeverMult > 1 ? bjFeverMult : 2);
            bjFeverMult = 1; // 勝利で倍率消化
        } else if(myScore > 21 || (oppScore <= 21 && myScore < oppScore)) {
            bjFeverMult = 1; // 敗北でリセット
        }
        updateCredit();
        setTimeout(showBetPhase, 2000);
    }

    function addCard3D(val, isPlayer) {
        const geo = new THREE.PlaneGeometry(0.5, 0.7);
        const mat = new THREE.MeshStandardMaterial({color: 0xffffff, side: THREE.DoubleSide});
        const card = new THREE.Mesh(geo, mat);
        const offset = (isPlayer ? myCards.length : oppCards.length) * 0.6;
        card.position.set(6 + (isPlayer?-1:1), -1.2, (isPlayer?1:-1) + offset);
        card.rotation.x = -Math.PI/2;
        scene.add(card); bjCards3D.push(card);
        if(isPlayer) myCards.push(val); else oppCards.push(val);
    }

    function clearCards3D() { bjCards3D.forEach(c => scene.remove(c)); bjCards3D.length = 0; }
    function updateBJUI() {
        document.getElementById('score-you').innerText = myScore;
        document.getElementById('score-opp').innerText = oppScore;
    }
    function updateCredit() { document.getElementById('multi-status').innerText = "Coin: " + credit; }

    // --- BASE SYSTEMS ---
    let targetY = 0, currY = 0, moveDir = {f:0,b:0,l:0,r:0}, vel = new THREE.Vector3();
    let isMobile = false, joy = {x:0, y:0}, lookId = null;

    function initAll() {
        updateCredit();
        loop();
    }

    function openBJ() {
        closeAllUI();
        document.getElementById('ui-bj').classList.add('active');
        document.getElementById('bj-menu').style.display = 'block';
        document.getElementById('bj-game').style.display = 'none';
        document.getElementById('bj-bet').style.display = 'none';
    }

    function closeAllUI() { document.querySelectorAll('.game-ui').forEach(u => u.classList.remove('active')); }

    // Click Detection
    document.addEventListener('mousedown', e => {
        if(document.querySelector('.game-ui.active') || e.target.closest('#chat-container')) return;
        const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const inter = ray.intersectObjects(scene.children, true);
        const obj = inter.find(i => i.object.parent && i.object.parent.userData.type);
        if(obj) {
            const type = obj.object.parent.userData.type;
            if(camera.position.distanceTo(obj.object.parent.position) < 6) {
                if(type === 'bj') openBJ();
            }
        }
    });

    // Mobile & Look
    window.addEventListener('touchstart', e => {
        for(let t of e.changedTouches) {
            if(t.clientX > window.innerWidth/2) lookId = t.identifier;
        }
    });
    window.addEventListener('touchmove', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === lookId) {
                targetY -= (t.clientX - (window.innerWidth*0.75)) * 0.0001;
            }
        }
    });

    function loop() {
        requestAnimationFrame(loop);
        if(!document.querySelector('.game-ui.active')) {
            currY += (targetY - currY) * 0.1;
            camera.rotation.set(0, currY, 0);
            // Move logic...
            camera.position.add(vel);
        }
        // Slot Animation
        slotReels.forEach(r => { r.rotation.x += 0.05; });
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
