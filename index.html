<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8-LINE SLOT - Multiplay</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --gold: #ffd700; --fever: #ff0000; }
        body { margin: 0; overflow: hidden; background: #fff; font-family: 'Arial Black', sans-serif; touch-action: none; user-select: none; }
        #three-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #mobile-toggle { position: fixed; top: 20px; left: 20px; z-index: 2000; padding: 10px 20px; background: #444; color: white; border: 2px solid #fff; border-radius: 5px; cursor: pointer; }
        #joystick-container { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(0,0,0,0.2); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; z-index: 2000; display: none; }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #multi-status { position: fixed; bottom: 10px; right: 10px; z-index: 3000; color: #000; background: rgba(255,255,255,0.7); padding: 5px 10px; font-size: 12px; border-radius: 5px; white-space: pre-line; pointer-events: none; }
        
        /* チャットコンテナのポインターイベントを調整 */
        #chat-container { position: fixed; bottom: 50px; left: 20px; z-index: 2500; width: 250px; pointer-events: none; }
        #chat-box { height: 120px; overflow-y: auto; background: rgba(0,0,0,0.5); color: white; font-size: 12px; padding: 5px; border-radius: 5px; margin-bottom: 5px; }
        /* 入力エリアは操作可能にする */
        #chat-input-area { display: flex; pointer-events: auto; }
        #chat-input { flex: 1; background: rgba(255,255,255,0.8); border: none; padding: 5px; border-radius: 3px; }
        
        #ui { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 1000; transform: scale(0); transition: 0.3s; }
        #ui.active { transform: scale(var(--ui-scale, 1)); pointer-events: auto; }
        .slot-container { width: 480px; height: 780px; background: #222; border: 10px solid #444; border-radius: 20px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); position: relative; }
        .paytable { position: absolute; right: 100%; top: 50px; margin-right: 20px; width: 160px; background: rgba(17, 17, 17, 0.95); border: 4px solid #444; border-radius: 10px; padding: 15px; color: gold; font-size: 1rem; }
        .lcd { width: 85%; height: 110px; background: #000; margin-top: 25px; border: 4px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #status-text { color: #f00; font-size: 2rem; }
        .reels { display: flex; gap: 10px; background: #000; padding: 15px; margin: 20px 0; border: 6px solid #666; }
        .reel-box { width: 110px; height: 240px; background: #fff; overflow: hidden; position: relative; }
        .strip { position: absolute; width: 100%; top: 0; left: 0; }
        .symbol { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 3.2rem; border-bottom: 1px solid #ddd; box-sizing: border-box; color: #000; }
        .stop-btn { width: 95px; height: 95px; border-radius: 50%; background: #ccc; border: 6px solid #999; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="initGame()">

<button id="mobile-toggle" onclick="toggleMobile()">スマホ操作 ON/OFF</button>
<div id="joystick-container"><div id="joystick-knob"></div></div>
<div id="three-canvas"></div>
<div id="multi-status">Connecting...</div>

<div id="chat-container">
    <div id="chat-box"></div>
    <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Chat..." onfocus="isTyping=true" onblur="isTyping=false">
        <button onclick="sendChat()" style="pointer-events:auto;">送</button>
    </div>
</div>

<div id="ui">
    <div class="slot-container">
        <div class="paytable" id="pay-list"></div>
        <div style="width:100%; display:flex; justify-content:space-between; padding:10px;">
            <button onclick="resetGame()" style="background:#822;color:#fff;border:none;padding:5px 15px;border-radius:5px;">RESET</button>
            <button onclick="closeUI()" style="background:#444;color:#fff;border:none;padding:5px 15px;border-radius:5px;">EXIT</button>
        </div>
        <div class="lcd"><div id="status-text">READY</div></div>
        <div class="reels">
            <div class="reel-box"><div id="s0" class="strip"></div></div>
            <div class="reel-box"><div id="s1" class="strip"></div></div>
            <div class="reel-box"><div id="s2" class="strip"></div></div>
        </div>
        <div style="color:red; font-size:2rem; margin-bottom:15px;">coin: <span id="credit">100</span></div>
        <div class="lever" onclick="start()" style="width:65px;height:65px;background:radial-gradient(#666,#222);border-radius:50%;border:4px solid #777;cursor:pointer;"></div>
        <div style="display:flex; gap:15px; margin-top:15px;">
            <button id="b0" class="stop-btn" disabled onclick="stopR(0)">STOP</button>
            <button id="b1" class="stop-btn" disabled onclick="stopR(1)">STOP</button>
            <button id="b2" class="stop-btn" disabled onclick="stopR(2)">STOP</button>
        </div>
    </div>
</div>

<script>
    // --- スロットロジック ---
    const PAYS = { '7️⃣': 9, '⭐': 8, '💎': 7, '🎰': 6, '🔔': 5, '🍉': 4, '🍇': 3, '🍒': 2 };
    let credit = 100, pos = [0,0,0], speed = [0,0,0], stopping = [false,false,false], targetPos = [0,0,0], REELS_DATA = [[],[],[]];

    function shuffleReels() {
        const base = ['🍒','🍒','🍇','🍉','🔔','💎','🎰','⭐','7️⃣'];
        [0,1,2].forEach(i => {
            REELS_DATA[i] = [...base, ...base].sort(()=>Math.random()-0.5);
            document.getElementById(`s${i}`).innerHTML = [...REELS_DATA[i], ...REELS_DATA[i]].map(s => `<div class="symbol">${s}</div>`).join('');
        });
    }

    // --- 3D 部屋の復元 ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('three-canvas').appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const dl = new THREE.DirectionalLight(0xffffff, 0.7); dl.position.set(5, 10, 7); scene.add(dl);

    function buildRoom() {
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 60), new THREE.MeshStandardMaterial({ color: 0x888888 }));
        floor.rotation.x = -Math.PI/2; floor.position.y = -4; scene.add(floor);
        const ceil = new THREE.Mesh(new THREE.PlaneGeometry(30, 60), new THREE.MeshStandardMaterial({ color: 0x444444 }));
        ceil.rotation.x = Math.PI/2; ceil.position.y = 5; scene.add(ceil);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
        const sw1 = new THREE.Mesh(new THREE.PlaneGeometry(60, 15), wallMat); sw1.position.set(-10, 0, 0); sw1.rotation.y = Math.PI/2; scene.add(sw1);
        const sw2 = new THREE.Mesh(new THREE.PlaneGeometry(60, 15), wallMat); sw2.position.set(10, 0, 0); sw2.rotation.y = -Math.PI/2; scene.add(sw2);
        const bw = new THREE.Mesh(new THREE.PlaneGeometry(20, 15), wallMat); bw.position.set(0, 0, 30); bw.rotation.y = Math.PI; scene.add(bw);
        for(let i=-2; i<=2; i++) {
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 1.2), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            body.position.set(-8.5, -2, i*8); scene.add(body);
        }
    }

    // --- マルチプレイ通信 ---
    const room = prompt("部屋番号", "777") || "777";
    const myId = "P" + Math.floor(Math.random()*9000);
    const hostId = "slot-room-" + room + "-host";
    const peer = new Peer(myId, { config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } });
    let conns = [], hostConn = null, others = {};

    peer.on('open', id => { document.getElementById('multi-status').innerText = `ID: ${id}\nROOM: ${room}`; tryConnect(); });
    function tryConnect() {
        const c = peer.connect(hostId);
        c.on('open', () => { hostConn = c; setup(c); });
        setTimeout(() => { if(!hostConn) startAsHost(); }, 2000);
    }
    function startAsHost() {
        const hp = new Peer(hostId, { config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } });
        hp.on('open', () => document.getElementById('multi-status').innerText = `HOSTING\nROOM: ${room}`);
        hp.on('connection', c => { conns.push(c); setup(c); });
    }
    function setup(c) {
        c.on('data', d => {
            if(d.type === 'move') {
                if(!others[d.id]) {
                    others[d.id] = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({ color: 0x00aaff }));
                    scene.add(others[d.id]);
                }
                others[d.id].position.set(d.x, d.y-0.5, d.z); others[d.id].rotation.y = d.ry;
            }
            if(d.type === 'chat') addChat(d.msg, d.id);
            if(peer.id === hostId) conns.forEach(cn => { if(cn.open && cn.peer !== c.peer) cn.send(d); });
        });
    }

    function sendChat() {
        const i = document.getElementById('chat-input'); if(!i.value) return;
        const d = {type:'chat', msg:i.value, id:myId}; addChat(i.value, "You");
        if(hostConn) hostConn.send(d); else conns.forEach(cn => cn.send(d));
        i.value = '';
    }
    function addChat(m, s) { const b = document.getElementById('chat-box'); b.innerHTML += `<div><b>${s}:</b> ${m}</div>`; b.scrollTop = b.scrollHeight; }

    // --- 操作系 (不具合修正版) ---
    let tp=0, ty=0, isMob=false, isTyping=false, joyX=0, joyY=0, ts={x:0, y:0};
    camera.position.set(0, -1, 15);

    window.addEventListener('touchstart', e => { 
        ts.x = e.touches[0].clientX; ts.y = e.touches[0].clientY; 
    }, {passive: false});

    window.addEventListener('touchmove', e => {
        if(!isMob || isTyping) return;
        const t = e.touches[0];
        // 画面右半分：視点移動 / 左半分：ジョイスティック
        if(t.clientX > window.innerWidth/2) {
            ty -= (t.clientX - ts.x) * 0.006; tp -= (t.clientY - ts.y) * 0.006;
            tp = Math.max(-1.4, Math.min(1.4, tp));
        } else {
            const r = document.getElementById('joystick-container').getBoundingClientRect();
            joyX = (t.clientX - (r.left + 60)) / 60; joyY = (t.clientY - (r.top + 60)) / 60;
            document.getElementById('joystick-knob').style.transform = `translate(calc(-50% + ${joyX*40}px), calc(-50% + ${joyY*40}px))`;
        }
        ts.x = t.clientX; ts.y = t.clientY;
    }, {passive: false});

    window.addEventListener('touchend', () => { joyX=0; joyY=0; document.getElementById('joystick-knob').style.transform = `translate(-50%, -50%)`; });

    // --- 初期化 & ループ ---
    function initGame() {
        shuffleReels(); buildRoom();
        const s = Math.min(window.innerWidth/500, window.innerHeight/820, 1);
        document.documentElement.style.setProperty('--ui-scale', s);
        loop();
    }
    let lastS = 0;
    function loop() {
        requestAnimationFrame(loop);
        if(!document.getElementById('ui').classList.contains('active') && !isTyping) {
            camera.rotation.set(tp, ty, 0, 'YXZ');
            if(isMob && (Math.abs(joyX)>0.1 || Math.abs(joyY)>0.1)) {
                let v = new THREE.Vector3(joyX, 0, joyY).applyQuaternion(camera.quaternion); v.y=0;
                camera.position.addScaledVector(v.normalize(), 0.15);
            }
            if(Date.now() - lastS > 50) {
                const d = {type:'move', id:myId, x:camera.position.x, y:camera.position.y, z:camera.position.z, ry:camera.rotation.y};
                if(hostConn && hostConn.open) hostConn.send(d); else conns.forEach(cn => cn.send(d));
                lastS = Date.now();
            }
        }
        renderer.render(scene, camera);
    }
    
    // スロット開始・停止・UI
    function start() { if(speed.some(s=>s>0)) return; credit-=3; document.getElementById('credit').innerText=credit; speed=[55,55,55]; stopping=[false,false,false]; [0,1,2].forEach(i=>document.getElementById(`b${i}`).disabled=false); animateSlot(); }
    function stopR(i) { let idx=Math.ceil(Math.abs(pos[i])/80)+1; targetPos[i]=-(idx*80); stopping[i]=true; document.getElementById(`b${i}`).disabled=true; }
    function animateSlot() { let m=false; [0,1,2].forEach(i=>{ if(speed[i]>0){ m=true; if(stopping[i]){ let d=targetPos[i]-pos[i]; if(Math.abs(d)<1){pos[i]=targetPos[i];speed[i]=0;}else pos[i]+=d*0.15; }else{ pos[i]-=speed[i]; if(pos[i]<=-1000)pos[i]=0; } document.getElementById(`s${i}`).style.top=pos[i]+"px"; } }); if(m) requestAnimationFrame(animateSlot); }
    function toggleMobile() { isMob=!isMob; document.getElementById('joystick-container').style.display=isMob?'block':'none'; }
    function closeUI() { document.getElementById('ui').classList.remove('active'); }
    function resetGame() { credit=100; document.getElementById('credit').innerText=credit; }
    
    // 修正：スマホの時は自動でUIを開かないよう、mousedown内の判定を調整
    document.addEventListener('mousedown', (e) => { 
        if(!isMob && !document.getElementById('ui').classList.contains('active') && !isTyping) {
            document.getElementById('ui').classList.add('active'); 
        }
    });
    document.addEventListener('keydown', e => { if(e.key==='Enter') sendChat(); });
</script>
</body>
</html>
