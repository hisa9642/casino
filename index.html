<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>8-LINE SLOT & CUSTOM BJ</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --gold: #ffd700; --fever: #ff0000; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; touch-action: none; user-select: none; }
        #three-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #mobile-toggle { position: fixed; top: 20px; left: 20px; z-index: 2000; padding: 10px 20px; background: #444; color: white; border: 2px solid #fff; border-radius: 5px; cursor: pointer; }
        #joystick-container { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(0,0,0,0.2); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; z-index: 2000; display: none; touch-action: none; }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #multi-status { position: fixed; bottom: 10px; right: 10px; z-index: 3000; color: #fff; background: rgba(0,0,0,0.7); padding: 10px; font-size: 12px; border-radius: 5px; white-space: pre-line; border: 1px solid #555; }

        #ui, #bj-ui { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 1000; transform: scale(0); transition: 0.3s; }
        #ui.active, #bj-ui.active { transform: scale(var(--ui-scale, 1)); pointer-events: auto; }
        .slot-container, .bj-container { width: 480px; height: 780px; background: #222; border: 10px solid #444; border-radius: 20px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); position: relative; }
        .bj-container { background: #0b2e0b; border-color: #265426; }
        
        .paytable { position: absolute; right: 100%; top: 50px; margin-right: 20px; width: 160px; background: rgba(17, 17, 17, 0.95); border: 4px solid #444; border-radius: 10px; padding: 15px; color: gold; font-size: 1rem; }
        @media (max-width: 850px) { .paytable { display: none; } }
        .pay-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 5px 0; }
        #win-effect-container { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; pointer-events: none; text-align: center; width: 100%; }
        .win-pop { color: #ff0000; font-size: 4rem; font-weight: bold; text-shadow: 0 0 20px #fff, 0 0 40px gold; animation: popIn 0.5s forwards, fadeOut 0.5s 2.5s forwards; margin: 10px; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }
        .lcd { width: 85%; height: 110px; background: #000; margin-top: 25px; border: 4px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #fever-label { color: #f00; font-size: 1.6rem; visibility: hidden; animation: blink 0.4s infinite alternate; }
        #status-text { color: #f00; font-size: 2rem; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.1; } }
        .reels { display: flex; gap: 10px; background: #000; padding: 15px; margin: 20px 0; border: 6px solid #666; }
        .reel-box { width: 110px; height: 240px; background: #fff; overflow: hidden; position: relative; }
        .strip { position: absolute; width: 100%; top: 0; left: 0; }
        .symbol { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 3.2rem; border-bottom: 1px solid #ddd; box-sizing: border-box; color: #000; }
        .stats { color: #f00; font-size: 1.8rem; display: flex; gap: 30px; margin-bottom: 15px; }
        .lever { width: 65px; height: 65px; background: radial-gradient(#666, #222); border-radius: 50%; border: 4px solid #777; cursor: pointer; }
        .stop-btn { width: 95px; height: 95px; border-radius: 50%; background: #ccc; border: 6px solid #999; font-weight: bold; cursor: pointer; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; opacity: 0.8; }

        /* BJ Style */
        .bj-screen { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 20px; box-sizing: border-box; }
        .card-row { display: flex; gap: 5px; min-height: 80px; }
        .card { width: 50px; height: 75px; background: white; border-radius: 5px; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
        .bj-btn { padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #444; color: #fff; border: 2px solid #888; border-radius: 5px; }
        .bj-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .fever-btn { background: #f00; border-color: #ff0; animation: blink 0.5s infinite alternate; }
    </style>
</head>
<body onload="initGame()" oncontextmenu="return false;">

<button id="mobile-toggle" onclick="toggleMobile()">スマホ用 ON/OFF</button>
<div id="joystick-container"><div id="joystick-knob"></div></div>
<div id="crosshair"></div>
<div id="win-effect-container"></div>
<div id="three-canvas"></div>
<div id="multi-status">Initializing...</div>

<div id="ui">
    <div class="slot-container" id="main-container">
        <div class="paytable" id="pay-list"></div>
        <div style="width:100%; display:flex; justify-content:space-between; padding:10px; box-sizing:border-box;">
            <button onclick="resetGame()" style="cursor:pointer; background: #822; color: white; border: none; padding: 5px 15px; border-radius: 5px;">RESET</button>
            <button onclick="closeUI()" style="cursor:pointer; background: #444; color: white; border: none; padding: 5px 15px; border-radius: 5px;">EXIT</button>
        </div>
        <div class="lcd"><div id="fever-label">🔥 FEVER TIME 🔥</div><div id="status-text">READY</div></div>
        <div class="reels">
            <div class="reel-box" id="rb0"><div id="s0" class="strip"></div></div>
            <div class="reel-box" id="rb1"><div id="s1" class="strip"></div></div>
            <div class="reel-box" id="rb2"><div id="s2" class="strip"></div></div>
        </div>
        <div class="stats"><div>coin: <span id="credit">100</span></div><div>BET: <span id="bet-val">3</span></div></div>
        <div style="margin-bottom:15px; color:white;">
            <button onclick="changeBet(-1)">-1</button><button onclick="changeBet(10)">+10</button>
            <button onclick="changeBet(1)">+1</button><button onclick="maxBet()">MAX</button>
        </div>
        <div class="lever" onclick="start()"></div>
        <div style="display:flex; gap:15px; margin-top:15px;">
            <button id="b0" class="stop-btn" disabled onclick="stopR(0)">STOP</button>
            <button id="b1" class="stop-btn" disabled onclick="stopR(1)">STOP</button>
            <button id="b2" class="stop-btn" disabled onclick="stopR(2)">STOP</button>
        </div>
    </div>
</div>

<div id="bj-ui">
    <div class="bj-container">
        <div style="width:100%; display:flex; justify-content:flex-end; padding:10px; box-sizing:border-box;">
            <button onclick="closeBJ()" style="cursor:pointer; background: #444; color: white; border: none; padding: 5px 15px; border-radius: 5px;">EXIT</button>
        </div>
        
        <div id="bj-mode-select" class="bj-screen">
            <div style="color:gold; font-size:2rem;">BLACKJACK</div>
            <button class="bj-btn" onclick="setBJMode('cpu')">CPUと対戦</button>
            <button class="bj-btn" onclick="setBJMode('multi')">同じ部屋の人と対戦</button>
        </div>

        <div id="bj-wait" class="bj-screen" style="display:none;">
            <div style="color:white;">対戦相手が座るのを待っています...</div>
        </div>

        <div id="bj-bet-select" class="bj-screen" style="display:none;">
            <div style="color:white;">BETを選択 (1-100)</div>
            <div style="color:red; font-size:1.5rem;">COIN: <span class="bj-coin-disp">0</span></div>
            <input type="range" id="bj-bet-range" min="1" max="100" value="10" oninput="document.getElementById('bj-bet-num').innerText=this.value">
            <div id="bj-bet-num" style="color:gold; font-size:2rem;">10</div>
            <button id="bj-start-btn" class="bj-btn" onclick="bjPreStart()">開始</button>
        </div>

        <div id="bj-game" class="bj-screen" style="display:none;">
            <div id="bj-fever-info" style="color:red; font-weight:bold;"></div>
            <div id="bj-opp-info" style="color:white; font-size:0.8rem;">Opponent: <span id="bj-opp-score">0</span></div>
            <div class="card-row" id="bj-opp-cards"></div>
            <hr style="width:80%; border:1px solid #444;">
            <div class="card-row" id="bj-my-cards"></div>
            <div id="bj-my-info" style="color:gold; font-size:1.2rem;">YOU: <span id="bj-my-score">0</span></div>
            
            <div id="bj-controls" style="display:flex; gap:10px;">
                <button id="bj-hit" class="bj-btn" onclick="bjHit()">HIT</button>
                <button id="bj-stand" class="bj-btn" onclick="bjStand()">STAND</button>
            </div>
            
            <div id="bj-fever-choice" style="display:none; flex-direction:column; gap:10px;">
                <div style="color:yellow;">21ぴったり！</div>
                <button class="bj-btn" onclick="bjEndWin()">そのまま勝利(通常配当)</button>
                <button class="bj-btn fever-btn" onclick="bjEnterFever()">フィーバー突入(次勝てば10倍！)</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- スロットロジック ---
    const PAYS = { '7️⃣': 9, '⭐': 8, '💎': 7, '🎰': 6, '🔔': 5, '🍉': 4, '🍇': 3, '🍒': 2 };
    let REELS_DATA = [[], [], []], credit = 100, bet = 3, pos = [0,0,0], speed = [0,0,0], stopping = [false,false,false], targetPos = [0,0,0];
    let isFever = false, isSuperFever = false, feverRounds = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTone(freq, type, dur, vol=0.1) { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + dur); }
    const sounds = { stop: () => playTone(440, 'sine', 0.1), winLine: () => playTone(880, 'square', 0.2), coin: () => playTone(1200 + Math.random()*400, 'sine', 0.1, 0.05), fever: () => { playTone(523, 'triangle', 0.3); setTimeout(()=>playTone(659, 'triangle', 0.3), 150); } };
    function saveGame() { localStorage.setItem('slot_credit', credit); document.querySelectorAll('.bj-coin-disp').forEach(e=>e.innerText=credit); }
    function loadGame() { let s = localStorage.getItem('slot_credit'); if(s) { credit = parseInt(s); document.getElementById('credit').innerText = credit; } saveGame(); }
    function resetGame() { if(confirm("RESET?")) { credit = 100; saveGame(); document.getElementById('credit').innerText = credit; } }
    
    function shuffleReels() { 
        const normBase = ['🍒','🍒','🍒','🍒','🍇','🍇','🍉','🔔','💎','🍉']; 
        const feverBase = ['7️⃣','7️⃣','7️⃣','⭐','⭐','🎰','🎰','💎','🍉','🍉']; 
        const sfBase = ['7️⃣','7️⃣','7️⃣','7️⃣','🍒','🍒','🍒','🍒','7️⃣','🍒']; 
        [0,1,2].forEach(i => { 
            let base = isSuperFever ? sfBase : (isFever ? feverBase : normBase); 
            REELS_DATA[i] = [...base, ...base].sort(()=>Math.random()-0.5); 
            document.getElementById(`s${i}`).innerHTML = [...REELS_DATA[i], ...REELS_DATA[i]].map(s => `<div class="symbol">${s}</div>`).join(''); 
        }); 
    }
    
    function changeBet(n) { if(speed.some(s=>s>0)) return; bet = Math.max(1, Math.min(100, credit, bet+n)); document.getElementById('bet-val').innerText = bet; }
    function maxBet() { changeBet(100); }
    function start() { 
        if(speed.some(s=>s>0) || credit < bet) return; 
        if(audioCtx.state === 'suspended') audioCtx.resume(); 
        document.getElementById('win-effect-container').innerHTML = ''; 
        if(feverRounds <= 0) { isFever = false; isSuperFever = false; document.getElementById('fever-label').style.visibility = 'hidden'; }
        shuffleReels(); credit -= bet; saveGame(); document.getElementById('credit').innerText = credit; 
        let lbl = isSuperFever ? "SUPER" : "FEVER";
        document.getElementById('status-text').innerText = (isFever || isSuperFever) ? `${lbl} ${feverRounds}` : "SPINNING...";
        speed = [55, 55, 55]; stopping = [false,false,false]; 
        [0,1,2].forEach(i => document.getElementById(`b${i}`).disabled = false);
        animateSlot(); 
    }
    function stopR(i) { sounds.stop(); let cur = Math.abs(pos[i]); let idx = Math.ceil(cur/80)+1; targetPos[i] = -((idx+1)*80); stopping[i] = true; document.getElementById(`b${i}`).disabled = true; }
    function animateSlot() { 
        let m = false; 
        [0,1,2].forEach(i => { if(speed[i] > 0) { m = true; if(stopping[i]) { let d = targetPos[i]-pos[i]; if(Math.abs(d)<1){pos[i]=targetPos[i]; speed[i]=0;} else pos[i]+=d*0.15; } else { pos[i]-=speed[i]; if(pos[i]<=-1600) pos[i]=0; } document.getElementById(`s${i}`).style.top = pos[i]+"px"; } }); 
        if(m) requestAnimationFrame(animateSlot); else if(stopping.every(s=>s)) check(); 
    }
    async function check() { 
        const grid = [0,1,2].map(i => { let off = Math.abs(Math.round(pos[i]/80)); return [REELS_DATA[i][off%20], REELS_DATA[i][(off+1)%20], REELS_DATA[i][(off+2)%20]]; }); 
        const lines = [[grid[0][1], grid[1][1], grid[2][1]], [grid[0][0], grid[1][0], grid[2][0]], [grid[0][2], grid[1][2], grid[2][2]], [grid[0][0], grid[1][1], grid[2][2]], [grid[0][2], grid[1][1], grid[2][0]], [grid[0][0], grid[0][1], grid[0][2]], [grid[1][0], grid[1][1], grid[1][2]], [grid[2][0], grid[2][1], grid[2][2]]]; 
        let winCnt = 0, mults = []; lines.forEach(l => { if(l[0]===l[1] && l[1]===l[2]) { winCnt++; mults.push(PAYS[l[0]]); } }); 
        if(mults.length > 0) { const container = document.getElementById('win-effect-container'); let currentTotal = 1; for(let i=0; i<mults.length; i++) { currentTotal *= mults[i]; if(winCnt >= 2) { const div = document.createElement('div'); div.className = 'win-pop'; div.innerText = i === 0 ? `${mults[i]}倍！` : `× ${mults[i]}倍！`; container.appendChild(div); sounds.winLine(); await new Promise(r => setTimeout(r, 600)); } } const finalDiv = document.createElement('div'); finalDiv.className = 'win-pop'; finalDiv.style.fontSize = '6rem'; finalDiv.style.color = 'gold'; finalDiv.innerText = `合計 ${currentTotal}倍！！`; container.appendChild(finalDiv); sounds.winLine(); sounds.fever(); credit += (bet * currentTotal); document.getElementById('credit').innerText = credit; saveGame(); if(isSuperFever) { if(winCnt >= 2) feverRounds = 2; else feverRounds--; } else { if(winCnt >= 2) { isSuperFever = true; isFever = false; feverRounds = 2; document.getElementById('fever-label').innerText = "🔥 SUPER FEVER 🔥"; document.getElementById('fever-label').style.visibility = 'visible'; } else { isFever = true; feverRounds = 3; document.getElementById('fever-label').innerText = "🔥 FEVER TIME 🔥"; document.getElementById('fever-label').style.visibility = 'visible'; } } } else { if(isFever || isSuperFever) feverRounds--; } if(feverRounds <= 0) { isFever = false; isSuperFever = false; document.getElementById('fever-label').style.visibility = 'hidden'; } let lbl = isSuperFever ? "SUPER" : "FEVER"; document.getElementById('status-text').innerText = (isFever || isSuperFever) ? `${lbl} ${feverRounds}` : "RETRY"; saveGame(); 
    }

    // --- ブラックジャックロジック ---
    let bjMode = 'cpu', bjState = 'bet', bjBet = 10, bjFeverMult = 1;
    let myCards = [], oppCards = [], bjDeck = [];
    let isBJMultiWaiting = false;

    function setBJMode(m) {
        bjMode = m;
        document.getElementById('bj-mode-select').style.display = 'none';
        if(m === 'multi') {
            document.getElementById('bj-wait').style.display = 'flex';
            isBJMultiWaiting = true;
            broadcastBJ({type: 'bj_join'});
        } else {
            showBJBet();
        }
    }
    function showBJBet() {
        document.getElementById('bj-wait').style.display = 'none';
        document.getElementById('bj-bet-select').style.display = 'flex';
        document.getElementById('bj-start-btn').style.display = (credit >= 1) ? 'block' : 'none';
    }
    function bjPreStart() {
        bjBet = parseInt(document.getElementById('bj-bet-range').value);
        if(credit < bjBet) return;
        credit -= bjBet; saveGame();
        bjStart();
    }
    function bjStart() {
        document.getElementById('bj-bet-select').style.display = 'none';
        document.getElementById('bj-game').style.display = 'flex';
        document.getElementById('bj-fever-choice').style.display = 'none';
        document.getElementById('bj-controls').style.display = 'flex';
        document.getElementById('bj-fever-info').innerText = bjFeverMult > 1 ? `FEVER x${bjFeverMult}!!` : "";
        myCards = []; oppCards = [];
        bjDeck = Array.from({length: 52}, (_, i) => ({v: (i%13)+1, s: ['♠','♥','♦','♣'][Math.floor(i/13)]})).sort(()=>Math.random()-0.5);
        updateBJDisplay();
        broadcastBJ({type: 'bj_play', cards: myCards, score: 0});
    }
    function getBJScore(cards) {
        let s = cards.reduce((a,c) => a + (c.v > 10 ? 10 : (c.v === 1 ? 11 : c.v)), 0);
        let aces = cards.filter(c=>c.v===1).length;
        while(s > 21 && aces > 0) { s -= 10; aces--; }
        return s;
    }
    function bjHit() {
        myCards.push(bjDeck.pop());
        const score = getBJScore(myCards);
        updateBJDisplay();
        broadcastBJ({type: 'bj_play', cards: myCards, score: score});
        if(score > 21) bjLose();
        else if(score === 21) {
            document.getElementById('bj-controls').style.display = 'none';
            document.getElementById('bj-fever-choice').style.display = 'flex';
        }
    }
    function bjStand() {
        if(bjMode === 'cpu') {
            while(getBJScore(oppCards) < 17) oppCards.push(bjDeck.pop());
            const myS = getBJScore(myCards), oppS = getBJScore(oppCards);
            if(oppS > 21 || myS > oppS) bjWin();
            else if(myS === oppS) bjDraw();
            else bjLose();
        } else {
            broadcastBJ({type: 'bj_stand', score: getBJScore(myCards)});
        }
    }
    function bjWin() {
        let winAmount = bjBet * 2 * bjFeverMult;
        credit += winAmount; bjFeverMult = 1;
        alert("勝利！ " + winAmount + "枚獲得");
        bjEnd();
    }
    function bjEndWin() { bjWin(); }
    function bjEnterFever() {
        bjFeverMult *= 10;
        alert("FEVER突入！次勝てば配当" + (bjFeverMult*2) + "倍！");
        bjStart();
    }
    function bjLose() { alert("敗北..."); bjFeverMult = 1; bjEnd(); }
    function bjDraw() { credit += bjBet; alert("引き分け"); bjEnd(); }
    function bjEnd() { saveGame(); document.getElementById('bj-game').style.display = 'none'; showBJBet(); }
    function updateBJDisplay() {
        const render = (id, cards) => {
            document.getElementById(id).innerHTML = cards.map(c => `<div class="card" style="color:${(c.s==='♥'||c.s==='♦')?'red':'black'}">${c.v===1?'A':(c.v>10?['J','Q','K'][c.v-11]:c.v)}<br>${c.s}</div>`).join('');
        };
        render('bj-my-cards', myCards); render('bj-opp-cards', oppCards);
        document.getElementById('bj-my-score').innerText = getBJScore(myCards);
        document.getElementById('bj-opp-score').innerText = getBJScore(oppCards);
    }

    // --- 3D 空間 ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById('three-canvas').appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const dl = new THREE.DirectionalLight(0xffffff, 0.8); dl.position.set(5, 10, 7); dl.castShadow = true; scene.add(dl);

    // テクスチャ生成
    function createTexture(c1, c2) {
        const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = c1; ctx.fillRect(0,0,256,256);
        ctx.strokeStyle = c2; ctx.lineWidth = 10; ctx.strokeRect(0,0,256,256);
        const tex = new THREE.CanvasTexture(canvas); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(15, 30);
        return tex;
    }
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 60), new THREE.MeshStandardMaterial({ map: createTexture('#333','#444') }));
    floor.rotation.x = -Math.PI/2; floor.position.y = -4; floor.receiveShadow = true; scene.add(floor);
    const ceil = new THREE.Mesh(new THREE.PlaneGeometry(30, 60), new THREE.MeshStandardMaterial({ map: createTexture('#222','#111') }));
    ceil.rotation.x = Math.PI/2; ceil.position.y = 5; scene.add(ceil);

    const machines = [], bjTables = [];
    function createMachine(x, z, color, isBJ) {
        const body = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 1.2), new THREE.MeshStandardMaterial({ color: color }));
        body.position.set(x, -2, z); scene.add(body);
        if(isBJ) bjTables.push(body); else machines.push(body);
    }
    for(let i=-2; i<=2; i++) { createMachine(-8.5, i*8, 0x111111, false); createMachine(8.5, i*8, 0x073b07, true); }

    // --- P2P マルチプレイ ---
    let myName = prompt("名前を入力してください", "Player") || "Player";
    let roomNumInput = prompt("部屋番号", "777") || "777";
    const myId = "P-" + roomNumInput + "-" + Math.floor(Math.random() * 9999);
    const hostId = "ROOM-" + roomNumInput + "-HOST";
    const peer = new Peer(myId);
    const otherPlayers = {}, connections = [];
    peer.on('open', id => { updateStatus(`ID: ${id}\nRoom: ${roomNumInput}`); const conn = peer.connect(hostId); setupConn(conn); });
    const peerHost = new Peer(hostId);
    peerHost.on('connection', conn => setupConn(conn));
    function setupConn(conn) {
        conn.on('open', () => { if(!connections.find(c => c.peer === conn.peer)) connections.push(conn); });
        conn.on('data', data => {
            if(data.type === 'move') {
                if(!otherPlayers[data.id]) { otherPlayers[data.id] = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshBasicMaterial({ color: 0x00ff00 })); scene.add(otherPlayers[data.id]); }
                otherPlayers[data.id].position.set(data.x, data.y - 1, data.z); otherPlayers[data.id].rotation.y = data.ry;
                if(peerHost.open) connections.forEach(c => { if(c.open && c.peer !== conn.peer) c.send(data); });
            }
            if(data.type === 'bj_join' && isBJMultiWaiting) { showBJBet(); broadcastBJ({type: 'bj_ready'}); }
            if(data.type === 'bj_ready' && isBJMultiWaiting) { showBJBet(); }
            if(data.type === 'bj_play') { oppCards = data.cards; updateBJDisplay(); }
        });
    }
    function broadcast(data) { connections.forEach(c => { if(c.open) c.send(data); }); }
    function broadcastBJ(data) { data.id = myId; broadcast(data); }

    // --- 操作系 ---
    let targetPitch = 0, targetYaw = 0, currentPitch = 0, currentYaw = 0, velocity = new THREE.Vector3(), moveDir = { f: false, b: false, l: false, r: false }, bobTime = 0, isMobile = false, joyDir = {x:0, y:0};
    camera.position.set(0, -1, 15);
    function updateUIScale() { const s = Math.min(window.innerWidth / 500, window.innerHeight / 820, 1); document.documentElement.style.setProperty('--ui-scale', s); }
    window.addEventListener('resize', updateUIScale);
    function toggleMobile() { isMobile = !isMobile; document.getElementById('joystick-container').style.display = isMobile ? 'block' : 'none'; }
    function closeUI(){ document.getElementById('ui').classList.remove('active'); }
    function closeBJ(){ document.getElementById('bj-ui').classList.remove('active'); }
    
    document.addEventListener('mousedown', () => {
        if(document.getElementById('ui').classList.contains('active') || document.getElementById('bj-ui').classList.contains('active')) return;
        const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
        if(ray.intersectObjects(machines).length > 0) { updateUIScale(); document.getElementById('ui').classList.add('active'); document.exitPointerLock(); }
        else if(ray.intersectObjects(bjTables).length > 0) { updateUIScale(); document.getElementById('bj-ui').classList.add('active'); document.exitPointerLock(); }
        else if(!isMobile) renderer.domElement.requestPointerLock();
    });
    document.addEventListener('mousemove', e => { if (document.pointerLockElement === renderer.domElement) { targetYaw -= e.movementX * 0.002; targetPitch -= e.movementY * 0.002; targetPitch = Math.max(-1.5, Math.min(1.5, targetPitch)); } });
    document.addEventListener('keydown', e => { const k = e.key.toLowerCase(); if(k==='w')moveDir.f=true; if(k==='s')moveDir.b=true; if(k==='a')moveDir.l=true; if(k==='d')moveDir.r=true; });
    document.addEventListener('keyup', e => { const k = e.key.toLowerCase(); if(k==='w')moveDir.f=false; if(k==='s')moveDir.b=false; if(k==='a')moveDir.l=false; if(k==='d')moveDir.r=false; });

    function initGame() { loadGame(); shuffleReels(); updateUIScale(); loop(); }
    function updateStatus(txt) { document.getElementById('multi-status').innerText = txt; }
    function loop() {
        requestAnimationFrame(loop);
        if (!document.getElementById('ui').classList.contains('active') && !document.getElementById('bj-ui').classList.contains('active')) {
            currentYaw += (targetYaw - currentYaw) * 0.15; currentPitch += (targetPitch - currentPitch) * 0.15;
            camera.rotation.set(currentPitch, currentYaw, 0, 'YXZ');
            let wishDir = new THREE.Vector3();
            if(isMobile) { wishDir.x = joyDir.x; wishDir.z = joyDir.y; } else { if(moveDir.f) wishDir.z -= 1; if(moveDir.b) wishDir.z += 1; if(moveDir.l) wishDir.x -= 1; if(moveDir.r) wishDir.x += 1; }
            wishDir.normalize().applyQuaternion(camera.quaternion); wishDir.y = 0;
            velocity.addScaledVector(wishDir, 0.02); velocity.multiplyScalar(0.85);
            if (velocity.length() > 0.01) { bobTime += 0.15; camera.position.y = -1 + Math.sin(bobTime) * 0.06; }
            camera.position.add(velocity);
            if(Math.abs(camera.position.x) > 9.5) camera.position.x = Math.sign(camera.position.x) * 9.5;
            if(Math.abs(camera.position.z) > 29.5) camera.position.z = Math.sign(camera.position.z) * 29.5;
            broadcast({ type: 'move', id: myId, x: camera.position.x, y: camera.position.y, z: camera.position.z, ry: camera.rotation.y });
            updateStatus(`Name: ${myName}\nRoom: ${roomNumInput}\nPlayers: ${Object.keys(otherPlayers).length + 1}`);
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
